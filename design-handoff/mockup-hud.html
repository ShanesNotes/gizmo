<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --void:#0C0A16;--panel:rgba(22,18,44,.72);--panel2:rgba(30,25,58,.66);--edge:rgba(255,247,232,.15);
  --lumen:#FFF7E8;--dim:rgba(255,247,232,.62);
  --mint:#5BE6A4;--cyan:#54D8FF;--violet:#A98BFF;--gold:#FFD24A;--coral:#FF6B7E;--pink:#FF79C6;--orange:#FF9D5C;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Nunito',sans-serif}
body{width:1280px;height:720px;overflow:hidden;color:var(--lumen);position:relative;
  background:radial-gradient(120% 90% at 50% 18%,#1B1440 0%,#120E28 48%,#0A0814 86%)}
.field{position:absolute;inset:0;background-image:radial-gradient(rgba(255,247,232,.05) 1.2px,transparent 1.2px);background-size:40px 40px}
.ent{position:absolute}
.streak{position:absolute;height:3px;border-radius:2px;background:linear-gradient(90deg,transparent,rgba(84,216,255,.5));filter:blur(.5px)}
/* panels */
.panel{position:absolute;background:var(--panel);border:1.5px solid var(--edge);border-radius:16px;
  backdrop-filter:blur(10px);box-shadow:0 16px 40px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,247,232,.08)}
.eyebrow{font-size:11px;font-weight:900;letter-spacing:1.6px;color:var(--dim);text-transform:uppercase}
/* run chip */
.run{left:22px;top:22px;display:flex;gap:16px;align-items:center;padding:12px 16px}
.run .score{font-family:'Fredoka';font-weight:700;font-size:32px;color:var(--gold);line-height:1;
  text-shadow:0 0 18px rgba(255,210,74,.4)}
.hearts{display:flex;gap:5px;max-width:96px;flex-wrap:wrap}
.hearts i{width:18px;height:16px;background:rgba(255,247,232,.16);
  clip-path:polygon(50% 100%,8% 56%,4% 25%,22% 5%,50% 22%,78% 5%,96% 25%,92% 56%)}
.hearts i.on{background:var(--coral);box-shadow:0 0 10px rgba(255,107,126,.6)}
/* stat panel */
.stats{right:22px;top:22px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px}
.stats .s{min-width:74px;padding:8px 12px;border-radius:11px;background:rgba(255,247,232,.05);text-align:left}
.stats .s b{display:block;font-family:'Fredoka';font-weight:700;font-size:20px;margin-top:2px}
.stats .lv b{color:var(--mint)}.stats .pw b{color:var(--violet)}.stats .ca b{color:var(--gold)}
/* bounty */
.bounty{left:50%;top:22px;transform:translateX(-50%);width:360px;padding:11px 14px 13px;
  display:grid;grid-template-columns:38px 1fr auto;gap:10px;align-items:center;
  border-color:rgba(255,107,126,.4);box-shadow:0 16px 40px rgba(0,0,0,.45),0 0 0 5px rgba(255,107,126,.08)}
.bounty .ic{width:38px;height:38px}
.bounty .t{font-family:'Fredoka';font-weight:700;font-size:18px;line-height:1}
.bounty .d{font-size:12px;color:var(--dim);font-weight:800;margin-top:2px}
.bounty .n{font-family:'Fredoka';font-weight:700;font-size:20px;color:var(--coral)}
.bar{grid-column:1/-1;height:7px;border-radius:99px;background:rgba(255,247,232,.12);overflow:hidden;margin-top:3px}
.bar i{display:block;height:100%;border-radius:99px}
/* build panel */
.build{left:22px;top:108px;width:248px;padding:11px 12px}
.build .row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.build .p{display:inline-flex;align-items:center;gap:6px;padding:5px 9px;border-radius:9px;
  background:rgba(255,247,232,.07);font-size:12px;font-weight:800}
.build .p b{display:grid;place-items:center;min-width:18px;height:18px;border-radius:50%;
  background:rgba(12,10,22,.6);font-size:10px;color:var(--lumen)}
.build .p.evo{background:rgba(255,210,74,.16);color:var(--gold);box-shadow:inset 0 0 0 1.5px rgba(255,210,74,.5)}
.dot{width:8px;height:8px;border-radius:50%}
/* progress */
.prog{left:22px;bottom:22px;width:380px;padding:12px 14px}
.prog .top{display:flex;justify-content:space-between;align-items:center}
.prog .lvl{font-family:'Fredoka';font-weight:700;font-size:15px}
.xp i{background:linear-gradient(90deg,var(--mint),var(--cyan),var(--gold))}
.rn i{background:linear-gradient(90deg,var(--pink),var(--orange),var(--gold))}
/* juice cluster */
.juice{position:absolute;left:50%;bottom:24px;transform:translateX(-50%);display:flex;gap:12px;align-items:flex-end}
.jc{width:138px;padding:9px 12px 11px;border-radius:14px;background:rgba(14,11,28,.82);
  border:2px solid var(--edge);backdrop-filter:blur(8px);box-shadow:0 14px 34px rgba(0,0,0,.5)}
.jc .h{display:flex;justify-content:space-between;align-items:center}
.jc .lab{font-size:10px;font-weight:900;letter-spacing:1.2px;color:var(--dim);text-transform:uppercase}
.jc .v{font-family:'Fredoka';font-weight:700;font-size:20px;line-height:1}
.jc .m{height:6px;border-radius:99px;background:rgba(255,247,232,.1);overflow:hidden;margin-top:7px}
.jc .m i{display:block;height:100%;border-radius:99px}
.jc.echo{border-color:rgba(169,139,255,.55)}.jc.echo .v{color:var(--violet)}.jc.echo .m i{background:var(--violet)}
.jc.flow{border-color:var(--mint);box-shadow:0 14px 34px rgba(0,0,0,.5),0 0 22px rgba(91,230,164,.25)}
.jc.flow .v{color:var(--mint)}.jc.flow .m i{background:linear-gradient(90deg,var(--cyan),var(--mint),var(--gold))}
.jc.surge{border-color:var(--gold);background:rgba(255,210,74,.92);box-shadow:0 14px 34px rgba(0,0,0,.5),0 0 0 5px rgba(255,210,74,.22)}
.jc.surge .lab{color:rgba(60,40,6,.7)}.jc.surge .v{color:#3A2806}.jc.surge .m{background:rgba(60,40,6,.25)}.jc.surge .m i{background:#3A2806}
.clutch{position:absolute;left:50%;bottom:150px;transform:translateX(-50%);width:150px;padding:9px 12px 11px;border-radius:14px;
  background:rgba(84,216,255,.92);border:2px solid var(--cyan);box-shadow:0 14px 34px rgba(0,0,0,.5),0 0 0 6px rgba(84,216,255,.18)}
.clutch .lab{font-size:10px;font-weight:900;letter-spacing:1.2px;color:rgba(7,36,48,.7);text-transform:uppercase}
.clutch .v{font-family:'Fredoka';font-weight:700;font-size:20px;color:#072430;display:flex;justify-content:space-between;align-items:center}
.clutch .m{height:6px;border-radius:99px;background:rgba(7,36,48,.25);overflow:hidden;margin-top:6px}
.clutch .m i{display:block;height:100%;background:#072430;border-radius:99px}
/* boost button */
.boost{position:absolute;right:22px;bottom:24px;width:120px;height:96px;border-radius:18px;display:grid;place-items:center;
  background:var(--gold);color:#3A2806;box-shadow:0 14px 34px rgba(0,0,0,.5),0 0 0 6px rgba(255,210,74,.22)}
.boost .bl{font-family:'Fredoka';font-weight:700;font-size:22px;letter-spacing:1px}
.boost .bs{font-size:11px;font-weight:900;letter-spacing:1px;opacity:.8}
.mute{position:absolute;right:152px;bottom:24px;width:50px;height:50px;border-radius:14px;background:rgba(14,11,28,.85);
  border:1.5px solid var(--edge);display:grid;place-items:center;font-size:20px}
/* callout */
.callout{position:absolute;left:556px;top:300px;text-align:center;transform:rotate(-6deg)}
.callout .big{font-family:'Fredoka';font-weight:700;font-size:60px;letter-spacing:1px;
  background:linear-gradient(180deg,#fff,#54D8FF);-webkit-background-clip:text;background-clip:text;color:transparent;
  -webkit-text-stroke:3px rgba(7,36,48,.5);filter:drop-shadow(0 0 22px rgba(84,216,255,.6))}
.callout .num{font-family:'Fredoka';font-weight:700;font-size:34px;color:var(--gold);margin-top:-6px;
  text-shadow:0 2px 0 rgba(60,40,6,.5),0 0 18px rgba(255,210,74,.6)}
</style></head>
<body>
  <div class="field"></div>
  <!-- playfield entities -->
  <div class="streak" style="left:380px;top:250px;width:120px;transform:rotate(18deg)"></div>
  <div class="streak" style="left:760px;top:430px;width:90px;transform:rotate(-12deg)"></div>
  <img class="ent" src="assets/enemy-drifter.svg" style="left:360px;top:170px;width:84px">
  <img class="ent" src="assets/enemy-bumper.svg" style="right:360px;top:210px;width:78px">
  <img class="ent" src="assets/enemy-behemoth.svg" style="right:300px;bottom:250px;width:104px">
  <img class="ent" src="assets/enemy-drifter.svg" style="left:470px;bottom:250px;width:70px;transform:rotate(12deg)">
  <img class="ent" src="assets/pickup-spark.svg" style="left:600px;top:250px;width:46px">
  <img class="ent" src="assets/pickup-spark.svg" style="left:720px;top:360px;width:40px">
  <img class="ent" src="assets/pickup-spark.svg" style="left:540px;bottom:300px;width:38px">
  <img class="ent" src="assets/pickup-cache.svg" style="right:430px;top:330px;width:64px">
  <img class="ent" src="assets/gizmo.svg" style="left:50%;top:52%;transform:translate(-50%,-50%);width:120px">
  <div class="callout"><div class="big">CLUTCH!</div><div class="num">+250</div></div>

  <!-- HUD -->
  <div class="panel run">
    <div><div class="eyebrow">Run Score</div><div class="score">42,180</div></div>
    <div class="hearts"><i class="on"></i><i class="on"></i><i class="on"></i><i class="on"></i><i></i></div>
  </div>

  <div class="panel stats">
    <div class="s lv"><span class="eyebrow">LV</span><b>7</b></div>
    <div class="s pw"><span class="eyebrow">Power</span><b>×3</b></div>
    <div class="s ca"><span class="eyebrow">Cache</span><b>4</b></div>
    <div class="s"><span class="eyebrow">Time</span><b>6:12</b></div>
  </div>

  <div class="panel bounty">
    <img class="ic" src="assets/icons.svg" style="object-fit:none;object-position:-500px 0;width:84px;height:84px;margin:-23px 0 -23px -23px">
    <div><div class="t">Bounty Chain</div><div class="d">Chase the gold pickup</div></div>
    <div class="n">3<span style="color:var(--dim);font-size:13px">/5</span></div>
    <div class="bar"><i style="width:60%;background:linear-gradient(90deg,var(--coral),var(--gold))"></i></div>
  </div>

  <div class="panel build">
    <div class="eyebrow">Build</div>
    <div class="row">
      <span class="p"><span class="dot" style="background:var(--cyan)"></span>Pulse Driver <b>3</b></span>
      <span class="p"><span class="dot" style="background:var(--mint)"></span>Spark Magnet <b>2</b></span>
      <span class="p evo">Echo Coil <b>EVO</b></span>
      <span class="p"><span class="dot" style="background:var(--violet)"></span>Nova Bloom <b>1</b></span>
      <span class="p"><span class="dot" style="background:var(--pink)"></span>Surge Cell <b>2</b></span>
    </div>
  </div>

  <div class="panel prog">
    <div class="top"><div class="lvl">Level 7</div><div class="eyebrow">Next in 340 XP</div></div>
    <div class="bar xp" style="margin-top:9px"><i style="width:72%"></i></div>
    <div class="bar rn" style="margin-top:8px;height:6px"><i style="width:45%"></i></div>
  </div>

  <!-- juice -->
  <div class="clutch"><div class="lab">Clutch Burst</div><div class="v">READY <span style="font-size:13px">×2</span></div><div class="m"><i style="width:88%"></i></div></div>
  <div class="juice">
    <div class="jc echo"><div class="h"><span class="lab">Echo</span><span class="v">1.4s</span></div><div class="m"><i style="width:52%"></i></div></div>
    <div class="jc flow"><div class="h"><span class="lab">Flow ×8</span><span class="v">RUSH</span></div><div class="m"><i style="width:80%"></i></div></div>
    <div class="jc surge"><div class="h"><span class="lab">Surge</span><span class="v">FULL</span></div><div class="m"><i style="width:100%"></i></div></div>
  </div>
  <div class="mute">🔊</div>
  <div class="boost"><div><div class="bl">BOOST</div><div class="bs">SNAP ⟶</div></div></div>
</body></html>
