<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" width="600" height="150" font-family="'Nunito',Arial,sans-serif" role="img" aria-label="Rarity tier frames">
  <defs>
    <linearGradient id="rar-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1C1838"/><stop offset="1" stop-color="#120F24"/>
    </linearGradient>
    <filter id="rar-g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <!-- card template repeated; data: x, color, name, glowOpacity -->
  <!-- COMMON -->
  <g transform="translate(10,10)">
    <rect x="0" y="0" width="100" height="130" rx="16" fill="url(#rar-base)" stroke="#8C86A8" stroke-width="3"/>
    <circle cx="50" cy="62" r="22" fill="none" stroke="#8C86A8" stroke-width="4"/>
    <rect x="22" y="18" width="56" height="20" rx="10" fill="#8C86A8"/>
    <text x="50" y="32" text-anchor="middle" font-size="11" font-weight="900" fill="#16122a">COMMON</text>
    <rect x="20" y="100" width="60" height="8" rx="4" fill="#8C86A8" opacity="0.5"/>
  </g>
  <!-- UNCOMMON -->
  <g transform="translate(128,10)">
    <rect x="-3" y="-3" width="106" height="136" rx="18" fill="none" stroke="#5BE6A4" stroke-width="2" opacity="0.35" filter="url(#rar-g)"/>
    <rect x="0" y="0" width="100" height="130" rx="16" fill="url(#rar-base)" stroke="#5BE6A4" stroke-width="3"/>
    <circle cx="50" cy="62" r="22" fill="none" stroke="#5BE6A4" stroke-width="4"/>
    <rect x="16" y="18" width="68" height="20" rx="10" fill="#5BE6A4"/>
    <text x="50" y="32" text-anchor="middle" font-size="11" font-weight="900" fill="#0c2018">UNCOMMON</text>
    <rect x="20" y="100" width="60" height="8" rx="4" fill="#5BE6A4" opacity="0.55"/>
  </g>
  <!-- RARE -->
  <g transform="translate(246,10)">
    <rect x="-4" y="-4" width="108" height="138" rx="19" fill="none" stroke="#54D8FF" stroke-width="3" opacity="0.5" filter="url(#rar-g)"/>
    <rect x="0" y="0" width="100" height="130" rx="16" fill="url(#rar-base)" stroke="#54D8FF" stroke-width="3"/>
    <circle cx="50" cy="62" r="22" fill="none" stroke="#54D8FF" stroke-width="4"/>
    <rect x="26" y="18" width="48" height="20" rx="10" fill="#54D8FF"/>
    <text x="50" y="32" text-anchor="middle" font-size="11" font-weight="900" fill="#072430">RARE</text>
    <rect x="20" y="100" width="60" height="8" rx="4" fill="#54D8FF" opacity="0.6"/>
  </g>
  <!-- EPIC -->
  <g transform="translate(364,10)">
    <rect x="-5" y="-5" width="110" height="140" rx="20" fill="none" stroke="#FF79C6" stroke-width="3" opacity="0.6" filter="url(#rar-g)"/>
    <rect x="0" y="0" width="100" height="130" rx="16" fill="url(#rar-base)" stroke="#FF79C6" stroke-width="3"/>
    <circle cx="50" cy="62" r="22" fill="none" stroke="#FF79C6" stroke-width="4"/>
    <rect x="28" y="18" width="44" height="20" rx="10" fill="#FF79C6"/>
    <text x="50" y="32" text-anchor="middle" font-size="11" font-weight="900" fill="#36082a">EPIC</text>
    <rect x="20" y="100" width="60" height="8" rx="4" fill="#FF79C6" opacity="0.6"/>
  </g>
  <!-- EVOLVE -->
  <g transform="translate(482,10)">
    <rect x="-6" y="-6" width="112" height="142" rx="22" fill="none" stroke="#FFD24A" stroke-width="4" opacity="0.7" filter="url(#rar-g)"/>
    <rect x="0" y="0" width="100" height="130" rx="16" fill="url(#rar-base)" stroke="#FFD24A" stroke-width="3.5"/>
    <circle cx="86" cy="116" r="30" fill="none" stroke="#FFD24A" stroke-width="6" opacity="0.4"/>
    <circle cx="50" cy="62" r="22" fill="none" stroke="#FFD24A" stroke-width="4"/>
    <path d="M52 48 L40 66 L49 66 L46 80 L62 58 L52 58 Z" fill="#FFD24A"/>
    <rect x="22" y="18" width="56" height="20" rx="10" fill="#FFD24A"/>
    <text x="50" y="32" text-anchor="middle" font-size="11" font-weight="900" fill="#3a2806">EVOLVE</text>
  </g>
</svg>
