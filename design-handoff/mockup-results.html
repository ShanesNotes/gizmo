<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{--lumen:#FFF7E8;--dim:rgba(255,247,232,.6);--mint:#5BE6A4;--cyan:#54D8FF;--violet:#A98BFF;--gold:#FFD24A;--pink:#FF79C6;--coral:#FF6B7E;--orange:#FF9D5C}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Nunito',sans-serif}
body{width:1280px;height:720px;overflow:hidden;color:var(--lumen);position:relative;
  background:radial-gradient(120% 90% at 50% 14%,#1B1440,#120E28 50%,#0A0814)}
.field{position:absolute;inset:0;background-image:radial-gradient(rgba(255,247,232,.05) 1.2px,transparent 1.2px);background-size:40px 40px;opacity:.6}
.card{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:560px;padding:30px 34px 26px;
  border-radius:26px;background:linear-gradient(180deg,rgba(32,26,60,.96),rgba(16,12,32,.98));
  border:2px solid rgba(255,247,232,.16);box-shadow:0 40px 90px rgba(0,0,0,.6);text-align:center}
.em{width:60px;height:60px;margin:-58px auto 6px;filter:drop-shadow(0 0 24px rgba(255,210,74,.55))}
.title{font-family:'Fredoka';font-weight:700;font-size:40px;letter-spacing:1px;line-height:1;
  background:linear-gradient(180deg,#fff,var(--mint));-webkit-background-clip:text;background-clip:text;color:transparent}
.score{font-family:'Fredoka';font-weight:700;font-size:78px;line-height:1;margin-top:8px;color:var(--gold);
  text-shadow:0 0 34px rgba(255,210,74,.45)}
.scLab{font-size:12px;font-weight:900;letter-spacing:2px;color:var(--dim);text-transform:uppercase}
.new{display:inline-block;margin-top:10px;padding:5px 14px;border-radius:99px;background:rgba(91,230,164,.16);
  color:var(--mint);font-weight:900;font-size:13px;letter-spacing:.5px;border:1.5px solid rgba(91,230,164,.5)}
.records{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:20px 0 14px}
.rec{padding:9px 6px;border-radius:11px;background:rgba(255,247,232,.05)}
.rec em{display:block;font-style:normal;font-size:10px;font-weight:900;letter-spacing:.6px;color:var(--dim);text-transform:uppercase}
.rec b{font-family:'Fredoka';font-weight:700;font-size:18px}
.awards{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.aw{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-radius:11px;font-weight:900;font-size:13px;letter-spacing:.4px}
.aw b{font-family:'Fredoka';font-weight:700;font-size:15px}
.aw.coral{background:rgba(255,107,126,.16);color:var(--coral)}
.aw.mint{background:rgba(91,230,164,.16);color:var(--mint)}
.aw.cyan{background:rgba(84,216,255,.16);color:var(--cyan)}
.aw.gold{background:rgba(255,210,74,.16);color:var(--gold)}
.rows{margin-bottom:18px;text-align:left}
.r{display:flex;justify-content:space-between;padding:8px 2px;border-bottom:1px solid rgba(255,247,232,.09);font-weight:800;font-size:14px;color:var(--dim)}
.r b{color:var(--lumen);font-weight:900}
.btns{display:flex;gap:10px}
.btn{flex:1;padding:15px;border-radius:14px;font-family:'Fredoka';font-weight:700;font-size:18px;text-align:center}
.btn.go{background:var(--mint);color:#0c2018;box-shadow:0 0 0 5px rgba(91,230,164,.14)}
.btn.alt{flex:0 0 150px;background:rgba(14,11,28,.85);border:2px solid rgba(255,247,232,.2);color:var(--lumen)}
.gizmo{position:absolute;left:calc(50% + 250px);top:calc(50% + 110px);width:120px;transform:rotate(8deg);filter:drop-shadow(0 14px 30px rgba(0,0,0,.5))}
</style></head>
<body>
  <div class="field"></div>
  <img class="gizmo" src="assets/gizmo.svg">
  <div class="card">
    <img class="em" src="assets/emblem.svg">
    <div class="title">STORM CLEARED</div>
    <div class="scLab" style="margin-top:14px">Final Score</div>
    <div class="score">128,540</div>
    <div class="new">★ NEW BEST — +12,400</div>
    <div class="records">
      <div class="rec"><em>Best Level</em><b style="color:var(--mint)">14</b></div>
      <div class="rec"><em>Top Flow</em><b style="color:var(--cyan)">×24</b></div>
      <div class="rec"><em>Caches</em><b style="color:var(--gold)">11</b></div>
      <div class="rec"><em>Deepest</em><b style="color:var(--violet)">8:40</b></div>
    </div>
    <div class="awards">
      <div class="aw coral"><span>Bounty Hunter</span><b>×7</b></div>
      <div class="aw mint"><span>Flow Master</span><b>×24</b></div>
      <div class="aw cyan"><span>Clutch King</span><b>×12</b></div>
      <div class="aw gold"><span>Cache Cracker</span><b>×11</b></div>
    </div>
    <div class="rows">
      <div class="r"><span>Sparks collected</span><b>1,842</b></div>
      <div class="r"><span>Shapes cleared</span><b>3,560</b></div>
      <div class="r"><span>Best Surge burst</span><b>+4,800</b></div>
    </div>
    <div class="btns">
      <div class="btn go">RUN IT BACK</div>
      <div class="btn alt">Title</div>
    </div>
  </div>
</body></html>
