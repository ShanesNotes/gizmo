<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 230" width="230" height="230" role="img" aria-label="Counterfeit Seal enemy — false authority">
  <defs>
    <linearGradient id="cf-b" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3A2433"/><stop offset="1" stop-color="#241423"/></linearGradient>
    <pattern id="cf-st" width="9" height="9" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#C45A40" opacity="0.3"/></pattern>
    <filter id="cf-g" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- octagonal seal body, inked -->
  <path d="M115 24 L163 44 L186 92 L186 138 L163 186 L115 206 L67 186 L44 138 L44 92 L67 44 Z"
        fill="url(#cf-b)" stroke="#211B17" stroke-width="6" stroke-linejoin="round"/>
  <path d="M115 24 L163 44 L186 92 L186 138 L163 186 L115 206 L67 186 L44 138 L44 92 L67 44 Z" fill="url(#cf-st)" opacity="0.6"/>
  <!-- FALSE gold ornament (a counterfeit office, slightly asymmetric) -->
  <g stroke="#A87A2E" stroke-width="4" fill="none" opacity="0.92">
    <path d="M115 40 L150 56 L166 96 L150 132"/>            <!-- one side of a crown-frame... -->
    <path d="M115 40 L82 58 L66 96 L80 130"/>               <!-- ...the other, mismatched (counterfeit) -->
  </g>
  <!-- a false crown that sits crooked -->
  <path d="M88 60 L100 44 L115 58 L130 42 L144 62 L132 72 L98 72 Z" fill="#E8BC88" stroke="#211B17" stroke-width="3" transform="rotate(-7 115 58)"/>
  <!-- craquelure crack (material memory) -->
  <path d="M115 72 L108 110 L128 138 L116 170" fill="none" stroke="#211B17" stroke-width="3" opacity="0.8"/>
  <path d="M108 110 L86 124 M128 138 L150 150" fill="none" stroke="#211B17" stroke-width="2.5" opacity="0.7"/>
  <!-- hollow averted eyes (refused duty) -->
  <g>
    <ellipse cx="95" cy="120" rx="13" ry="14" fill="#0E0B12"/><ellipse cx="135" cy="120" rx="13" ry="14" fill="#0E0B12"/>
    <circle cx="99" cy="123" r="5" fill="#C45A40"/><circle cx="131" cy="123" r="5" fill="#C45A40"/>
    <path d="M80 106 L108 112" stroke="#211B17" stroke-width="5" stroke-linecap="round"/>
    <path d="M150 106 L122 112" stroke="#211B17" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- broken seal mark at base -->
  <circle cx="115" cy="168" r="16" fill="#7E2531" stroke="#211B17" stroke-width="3"/>
  <path d="M104 168 L126 168" stroke="#0E0B12" stroke-width="3"/>
  <path d="M115 158 L110 168 L118 168 L113 178" fill="#5A1A24"/>
</svg>
