<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 480" width="440" height="480" role="img" aria-label="Gizmo, illuminated — the spark in a gold-ground aureole">
  <defs>
    <radialGradient id="gi-ground" cx="0.5" cy="0.46" r="0.55">
      <stop offset="0" stop-color="#F6DCA6"/><stop offset="0.5" stop-color="#E8BC88"/>
      <stop offset="0.84" stop-color="#A87A2E"/><stop offset="1" stop-color="#7A5020"/>
    </radialGradient>
    <radialGradient id="gi-core" cx="0.42" cy="0.38" r="0.75">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="0.3" stop-color="#C9F6FF"/>
      <stop offset="0.62" stop-color="#54D8FF"/><stop offset="1" stop-color="#1E86C8"/>
    </radialGradient>
    <linearGradient id="gi-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFDF6"/><stop offset="0.55" stop-color="#F4ECFF"/><stop offset="1" stop-color="#D9CBFF"/>
    </linearGradient>
    <linearGradient id="gi-thrust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#54D8FF" stop-opacity="0.95"/><stop offset="1" stop-color="#7AE6FF" stop-opacity="0"/>
    </linearGradient>
    <pattern id="gi-stipple" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(8)">
      <circle cx="2" cy="2" r="1.1" fill="#FFF7E8" opacity="0.7"/>
    </pattern>
    <filter id="gi-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ray crown (dashed thick gold ring = radiating ticks) -->
  <circle cx="220" cy="216" r="172" fill="none" stroke="#E8BC88" stroke-width="22"
          stroke-dasharray="3 17" opacity="0.85" filter="url(#gi-glow)"/>
  <circle cx="220" cy="216" r="150" fill="none" stroke="#A87A2E" stroke-width="9" stroke-dasharray="2 12" opacity="0.8"/>

  <!-- gold ground disc -->
  <circle cx="220" cy="216" r="132" fill="url(#gi-ground)" stroke="#7A5020" stroke-width="4"/>
  <circle cx="220" cy="216" r="132" fill="url(#gi-stipple)"/>
  <!-- concentric illuminated rings -->
  <circle cx="220" cy="216" r="120" fill="none" stroke="#FFF3D2" stroke-width="2" opacity="0.55"/>
  <circle cx="220" cy="216" r="104" fill="none" stroke="#7A5020" stroke-width="2.5" opacity="0.7"/>
  <!-- ink covenant sigils around the inner ring (abstract marks: bolt, thread-knot, flame, ring) -->
  <g stroke="#211B17" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <path d="M220 116 l-9 15 l7 0 l-5 13 l13 -18 l-7 0 Z" fill="#211B17"/>          <!-- top: surge bolt -->
    <path d="M312 200 q10 8 0 16 q-10 8 0 16"/>                                       <!-- right: echo ripple -->
    <path d="M220 300 q-12 -10 0 -20 q12 -10 0 -20" />                                 <!-- bottom: flow thread -->
    <circle cx="128" cy="216" r="7"/>                                                  <!-- left: vigil ring -->
  </g>

  <!-- thruster plume -->
  <path d="M196 320 C206 348 206 372 220 410 C234 372 234 348 244 320 Z" fill="url(#gi-thrust)" filter="url(#gi-glow)"/>

  <!-- Gizmo body (inked) -->
  <g filter="url(#gi-glow)">
    <path d="M220 132 C262 152 280 192 280 226 C280 272 256 302 220 302 C184 302 160 272 160 226 C160 192 178 152 220 132 Z"
          fill="url(#gi-body)" stroke="#211B17" stroke-width="6" stroke-linejoin="round"/>
  </g>
  <path d="M220 146 C246 159 260 182 262 210 C249 188 232 174 220 174 C208 174 191 188 178 210 C180 182 194 159 220 146 Z" fill="#FFFFFF" opacity="0.5"/>
  <!-- side fins (gold leaf) -->
  <g stroke="#7A5020" stroke-width="3.5" stroke-linejoin="round">
    <path d="M163 250 C145 253 139 270 151 283 C160 273 165 262 168 252 Z" fill="#E8BC88"/>
    <path d="M277 250 C295 253 301 270 289 283 C280 273 275 262 272 252 Z" fill="#E8BC88"/>
  </g>
  <!-- core lens (the uncreated spark) -->
  <circle cx="220" cy="222" r="50" fill="#0E0B1A"/>
  <circle cx="220" cy="222" r="45" fill="url(#gi-core)" filter="url(#gi-glow)"/>
  <circle cx="220" cy="222" r="45" fill="none" stroke="#FFF3D2" stroke-width="2.5" opacity="0.7"/>
  <circle cx="204" cy="206" r="11" fill="#FFFFFF" opacity="0.95"/>
  <!-- ink sigil inscribed over the core: a small surge-glyph in a ring -->
  <circle cx="220" cy="222" r="22" fill="none" stroke="#0E0B1A" stroke-width="3" opacity="0.5"/>
  <path d="M226 206 L210 226 L221 226 L216 240 L232 218 L222 218 Z" fill="#FFF3D2" stroke="#1E86C8" stroke-width="1.5" opacity="0.92"/>
  <!-- antenna spark -->
  <path d="M224 104 l-13 30 l14 -4 l-9 27 l24 -36 l-15 4 Z" fill="#FFD24A" stroke="#7A5020" stroke-width="2" filter="url(#gi-glow)"/>
</svg>
