<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" width="720" height="180" font-family="'Nunito',sans-serif" role="img" aria-label="Rarity as illuminated rank">
  <defs>
    <pattern id="ri-st" width="8" height="8" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#FFF7E8" opacity="0.5"/></pattern>
    <radialGradient id="ri-gold" cx="0.5" cy="0.42" r="0.62"><stop offset="0" stop-color="#F6DCA6"/><stop offset="0.6" stop-color="#E8BC88"/><stop offset="1" stop-color="#A87A2E"/></radialGradient>
    <filter id="ri-g" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- COMMON: plain ink mark, no gold -->
  <g transform="translate(75,72)">
    <circle r="56" fill="#181426" stroke="#3A3550" stroke-width="4"/>
    <path d="M-16 6 L16 6" stroke="#8C86A8" stroke-width="7" stroke-linecap="round"/>
    <text y="92" text-anchor="middle" font-size="13" font-weight="900" fill="#8C86A8" letter-spacing="1">COMMON</text>
  </g>
  <!-- UNCOMMON: a little gold + mint -->
  <g transform="translate(215,72)">
    <circle r="56" fill="#181426" stroke="#A87A2E" stroke-width="3.5"/>
    <path d="M-16 -2 L16 -2 M-12 12 L12 12" stroke="#5BE6A4" stroke-width="6" stroke-linecap="round"/>
    <path d="M0 -24 l6 6 l-6 6 l-6 -6 Z" fill="#5BE6A4" stroke="#0c2018" stroke-width="1.5"/>
    <text y="92" text-anchor="middle" font-size="13" font-weight="900" fill="#5BE6A4" letter-spacing="1">UNCOMMON</text>
  </g>
  <!-- RARE: gold ring + stipple + cyan gem -->
  <g transform="translate(355,72)">
    <circle r="60" fill="none" stroke="#E8BC88" stroke-width="7" stroke-dasharray="2 11" opacity="0.6"/>
    <circle r="56" fill="#1a1530" stroke="#E8BC88" stroke-width="3.5"/>
    <circle r="56" fill="url(#ri-st)" opacity="0.4"/>
    <path d="M-14 8 L14 8 M-16 -6 L16 -6 M-10 -20 L10 -20" stroke="#54D8FF" stroke-width="5.5" stroke-linecap="round"/>
    <path d="M0 -32 l7 7 l-7 7 l-7 -7 Z" fill="#54D8FF" stroke="#072430" stroke-width="1.5" filter="url(#ri-g)"/>
    <text y="92" text-anchor="middle" font-size="13" font-weight="900" fill="#54D8FF" letter-spacing="1">RARE</text>
  </g>
  <!-- EPIC: partial gold ground + ornament + 2 gems -->
  <g transform="translate(495,72)">
    <circle r="62" fill="none" stroke="#E8BC88" stroke-width="9" stroke-dasharray="2 9" opacity="0.7"/>
    <circle r="56" fill="#241a3a" stroke="#FF79C6" stroke-width="3.5"/>
    <circle r="56" fill="url(#ri-st)" opacity="0.4"/>
    <circle r="46" fill="none" stroke="#A87A2E" stroke-width="2"/>
    <path d="M0 -28 C8 -14 8 0 0 8 C-8 0 -8 -14 0 -28 Z" fill="#FF79C6" filter="url(#ri-g)"/>
    <path d="M-30 18 l6 6 l-6 6 l-6 -6 Z" fill="#FFD24A"/><path d="M30 18 l6 6 l-6 6 l-6 -6 Z" fill="#FFD24A"/>
    <text y="92" text-anchor="middle" font-size="13" font-weight="900" fill="#FF79C6" letter-spacing="1">EPIC</text>
  </g>
  <!-- EVOLVE: fully illuminated — gold ground + ray crown + wax seal -->
  <g transform="translate(640,72)">
    <circle r="64" fill="none" stroke="#E8BC88" stroke-width="11" stroke-dasharray="2 8" opacity="0.85" filter="url(#ri-g)"/>
    <circle r="56" fill="url(#ri-gold)" stroke="#211B17" stroke-width="4"/>
    <circle r="56" fill="url(#ri-st)"/>
    <circle r="46" fill="none" stroke="#7A5020" stroke-width="2.5"/>
    <circle r="26" fill="#7E2531" stroke="#211B17" stroke-width="3" filter="url(#ri-g)"/>
    <circle r="26" fill="none" stroke="#E8BC88" stroke-width="2"/>
    <path d="M5 -16 L-9 6 L1 6 L-3 20 L11 0 L2 0 Z" fill="#FFD24A" stroke="#FFF3D2" stroke-width="1.5"/>
    <text y="92" text-anchor="middle" font-size="13" font-weight="900" fill="#FFD24A" letter-spacing="1">EVOLVE</text>
  </g>
</svg>
