<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 210" width="560" height="210" font-family="'Nunito',sans-serif" role="img" aria-label="Counterfeit-authority enemy family">
  <defs>
    <pattern id="ef-st" width="9" height="9" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#C45A40" opacity="0.28"/></pattern>
    <filter id="ef-g" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- MOTE — basic low-rank counterfeit (rounded triangle) -->
  <g transform="translate(95,86)">
    <path d="M0 -58 Q14 -54 22 -34 L44 30 Q50 50 30 52 L-30 52 Q-50 50 -44 30 L-22 -34 Q-14 -54 0 -58 Z"
          fill="#43356E" stroke="#1C1730" stroke-width="5" stroke-linejoin="round"/>
    <path d="M0 -38 l5 5 l-5 5 l-5 -5 Z" fill="#A87A2E" stroke="#1C1730" stroke-width="1.5"/>
    <ellipse cx="-12" cy="6" rx="9" ry="10" fill="#0E0B12"/><ellipse cx="12" cy="6" rx="9" ry="10" fill="#0E0B12"/>
    <circle cx="-10" cy="8" r="3.5" fill="#C45A40"/><circle cx="14" cy="8" r="3.5" fill="#C45A40"/>
    <path d="M-6 30 L6 30" stroke="#1C1730" stroke-width="3.5" stroke-linecap="round"/>
    <text y="86" text-anchor="middle" font-size="13" font-weight="900" fill="#9E92C8">MOTE</text>
  </g>

  <!-- WARDEN — heavy blocker (barred square seal) -->
  <g transform="translate(280,86)">
    <rect x="-50" y="-50" width="100" height="100" rx="20" fill="#2C2740" stroke="#15121F" stroke-width="6"/>
    <rect x="-50" y="-50" width="100" height="100" rx="20" fill="url(#ef-st)" opacity="0.5"/>
    <g stroke="#A87A2E" stroke-width="7"><path d="M-40 -14 L40 -14"/><path d="M-40 14 L40 14"/></g>
    <g stroke="#E8BC88" stroke-width="2"><path d="M-40 -14 L40 -14"/><path d="M-40 14 L40 14"/></g>
    <g fill="#FFD24A" stroke="#7A5020" stroke-width="1.5"><circle cx="-38" cy="-38" r="5"/><circle cx="38" cy="-38" r="5"/><circle cx="-38" cy="38" r="5"/><circle cx="38" cy="38" r="5"/></g>
    <ellipse cx="-16" cy="-30" rx="11" ry="11" fill="#0E0B12"/><ellipse cx="16" cy="-30" rx="11" ry="11" fill="#0E0B12"/>
    <circle cx="-13" cy="-28" r="4.5" fill="#C45A40"/><circle cx="19" cy="-28" r="4.5" fill="#C45A40"/>
    <path d="M-30 -44 L-4 -38 M30 -44 L4 -38" stroke="#15121F" stroke-width="5" stroke-linecap="round"/>
    <text y="86" text-anchor="middle" font-size="13" font-weight="900" fill="#C9A24A">WARDEN</text>
  </g>

  <!-- HERALD — ranged caster (kite with false proclamation) -->
  <g transform="translate(465,86)">
    <path d="M0 -56 L40 -6 L0 56 L-40 -6 Z" fill="#3A2D55" stroke="#1C1730" stroke-width="5" stroke-linejoin="round"/>
    <path d="M0 -56 L40 -6 L0 56 L-40 -6 Z" fill="url(#ef-st)" opacity="0.4"/>
    <!-- false unfurled proclamation -->
    <path d="M-16 -22 q16 -6 32 0 l0 22 q-16 -6 -32 0 Z" fill="#E8BC88" stroke="#7A5020" stroke-width="2"/>
    <path d="M-10 -16 L8 -16 M-10 -8 L6 -8" stroke="#7A5020" stroke-width="2"/>
    <ellipse cx="-12" cy="20" rx="8" ry="9" fill="#0E0B12"/><ellipse cx="12" cy="20" rx="8" ry="9" fill="#0E0B12"/>
    <circle cx="-10" cy="22" r="3.2" fill="#A98BFF"/><circle cx="14" cy="22" r="3.2" fill="#A98BFF"/>
    <!-- emitted false mote -->
    <circle cx="0" cy="40" r="5" fill="#A98BFF" filter="url(#ef-g)"/>
    <text y="86" text-anchor="middle" font-size="13" font-weight="900" fill="#A98BFF">HERALD</text>
  </g>
</svg>
