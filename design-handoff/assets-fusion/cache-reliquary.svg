<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 210" width="190" height="210" role="img" aria-label="Cache as sealed reliquary">
  <defs>
    <linearGradient id="rq-b" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#243A52"/><stop offset="1" stop-color="#152233"/></linearGradient>
    <pattern id="rq-st" width="8" height="8" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#54D8FF" opacity="0.35"/></pattern>
    <filter id="rq-g" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- casket body, inked -->
  <rect x="30" y="44" width="130" height="130" rx="20" fill="url(#rq-b)" stroke="#211B17" stroke-width="6"/>
  <rect x="30" y="44" width="130" height="130" rx="20" fill="url(#rq-st)" opacity="0.5"/>
  <!-- gold-leaf banding (cross bands) -->
  <g stroke="#A87A2E" stroke-width="9"><path d="M95 46 L95 172"/><path d="M32 109 L158 109"/></g>
  <g stroke="#E8BC88" stroke-width="3"><path d="M95 46 L95 172"/><path d="M32 109 L158 109"/></g>
  <!-- light leaking from seams (stored light within) -->
  <g filter="url(#rq-g)" stroke="#54D8FF" stroke-width="2.5" opacity="0.8"><path d="M40 80 L150 80" stroke-dasharray="2 8"/><path d="M40 140 L150 140" stroke-dasharray="2 8"/></g>
  <!-- gold corner mounts -->
  <g fill="none" stroke="#E8BC88" stroke-width="6" stroke-linecap="round">
    <path d="M44 62 L44 50 Q44 46 50 46 L62 46"/><path d="M146 62 L146 50 Q146 46 140 46 L128 46"/>
    <path d="M44 156 L44 168 Q44 172 50 172 L62 172"/><path d="M146 156 L146 168 Q146 172 140 172 L128 172"/>
  </g>
  <!-- central WAX SEAL holding it shut -->
  <circle cx="95" cy="109" r="30" fill="#7E2531" stroke="#211B17" stroke-width="4" filter="url(#rq-g)"/>
  <circle cx="95" cy="109" r="30" fill="none" stroke="#E8BC88" stroke-width="2"/>
  <circle cx="95" cy="109" r="24" fill="none" stroke="#5A1A24" stroke-width="2"/>
  <!-- emboss sigil in the wax: a closed surge-bolt -->
  <path d="M101 92 L83 113 L94 113 L89 128 L108 102 L96 102 Z" fill="#5A1A24" stroke="#A03040" stroke-width="1.5"/>
  <!-- top clasp -->
  <rect x="83" y="32" width="24" height="16" rx="5" fill="#E8BC88" stroke="#7A5020" stroke-width="2.5"/>
  <text x="95" y="198" text-anchor="middle" font-family="'Nunito',sans-serif" font-size="13" font-weight="900" fill="#E8BC88" letter-spacing="1">SEALED RELIQUARY</text>
</svg>
