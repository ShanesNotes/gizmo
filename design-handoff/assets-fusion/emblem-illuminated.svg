<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Gizmo emblem C — illuminated initial G">
  <defs>
    <radialGradient id="c-ground" cx="0.5" cy="0.44" r="0.62"><stop offset="0" stop-color="#F6DCA6"/><stop offset="0.55" stop-color="#E8BC88"/><stop offset="0.86" stop-color="#A87A2E"/><stop offset="1" stop-color="#7A5020"/></radialGradient>
    <pattern id="c-st" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(8)"><circle cx="2" cy="2" r="1.1" fill="#FFF7E8" opacity="0.6"/></pattern>
    <filter id="c-g" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- ray-tick crown -->
  <circle cx="120" cy="120" r="110" fill="none" stroke="#E8BC88" stroke-width="12" stroke-dasharray="2 13" opacity="0.8" filter="url(#c-g)"/>
  <!-- gold ground -->
  <circle cx="120" cy="120" r="98" fill="url(#c-ground)" stroke="#211B17" stroke-width="5"/>
  <circle cx="120" cy="120" r="98" fill="url(#c-st)"/>
  <circle cx="120" cy="120" r="86" fill="none" stroke="#FFF3D2" stroke-width="2" opacity="0.5"/>
  <circle cx="120" cy="120" r="80" fill="none" stroke="#7A5020" stroke-width="2.5"/>
  <!-- 4 illuminated corner gems -->
  <g fill="#7E2531" stroke="#E8BC88" stroke-width="2">
    <path d="M120 28 l7 7 l-7 7 l-7 -7 Z"/><path d="M120 198 l7 7 l-7 7 l-7 -7 Z"/>
    <path d="M28 120 l7 7 l-7 7 l-7 -7 Z"/><path d="M198 120 l7 7 l-7 7 l-7 -7 Z"/>
  </g>
  <!-- the illuminated G (ink on gold) -->
  <path d="M154.7 98.9 A44 44 0 1 0 154.7 153.1" fill="none" stroke="#211B17" stroke-width="18" stroke-linecap="round" filter="url(#c-g)"/>
  <path d="M120 126 L156 126" stroke="#211B17" stroke-width="18" stroke-linecap="round"/>
  <!-- cyan spark held in the G -->
  <circle cx="120" cy="126" r="11" fill="#54D8FF" filter="url(#c-g)"/>
  <circle cx="120" cy="126" r="11" fill="none" stroke="#0B0914" stroke-width="2.5"/>
  <circle cx="116" cy="122" r="3.5" fill="#FFFFFF"/>
</svg>
