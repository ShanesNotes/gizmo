<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Gizmo emblem A — eye seal">
  <defs>
    <radialGradient id="a-grd" cx="0.5" cy="0.44" r="0.6"><stop offset="0" stop-color="#221A3E"/><stop offset="0.7" stop-color="#14102A"/><stop offset="1" stop-color="#0B0914"/></radialGradient>
    <radialGradient id="a-core" cx="0.42" cy="0.38" r="0.7"><stop offset="0" stop-color="#FFFFFF"/><stop offset="0.28" stop-color="#C9F6FF"/><stop offset="0.62" stop-color="#54D8FF"/><stop offset="1" stop-color="#176C9E"/></radialGradient>
    <pattern id="a-st" width="9" height="9" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#E8BC88" opacity="0.28"/></pattern>
    <filter id="a-g" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- seal ground -->
  <circle cx="120" cy="120" r="106" fill="url(#a-grd)" stroke="#211B17" stroke-width="4"/>
  <circle cx="120" cy="120" r="106" fill="url(#a-st)"/>
  <!-- gold-leaf double ring -->
  <circle cx="120" cy="120" r="100" fill="none" stroke="#A87A2E" stroke-width="8"/>
  <circle cx="120" cy="120" r="100" fill="none" stroke="#E8BC88" stroke-width="2.5"/>
  <circle cx="120" cy="120" r="88" fill="none" stroke="#7A5020" stroke-width="2" opacity="0.7"/>
  <!-- four covenant studs (hue-coded, minimal) -->
  <circle cx="120" cy="26" r="6" fill="#5BE6A4" stroke="#211B17" stroke-width="2"/>
  <circle cx="214" cy="120" r="6" fill="#FFD24A" stroke="#211B17" stroke-width="2"/>
  <circle cx="120" cy="214" r="6" fill="#A98BFF" stroke="#211B17" stroke-width="2"/>
  <circle cx="26" cy="120" r="6" fill="#54D8FF" stroke="#211B17" stroke-width="2"/>
  <!-- gold bolt brow / spark -->
  <path d="M132 56 L104 92 L120 92 L112 118 L140 80 L124 80 Z" fill="#FFD24A" stroke="#211B17" stroke-width="2.5" stroke-linejoin="round" filter="url(#a-g)"/>
  <!-- Gizmo core eye -->
  <circle cx="120" cy="132" r="50" fill="#0B0914"/>
  <circle cx="120" cy="132" r="44" fill="url(#a-core)" filter="url(#a-g)"/>
  <circle cx="120" cy="132" r="44" fill="none" stroke="#E8BC88" stroke-width="2.5"/>
  <circle cx="104" cy="116" r="11" fill="#FFFFFF"/>
  <circle cx="134" cy="148" r="5" fill="#FFFFFF" opacity="0.7"/>
  <!-- side fin ticks -->
  <path d="M58 130 q-10 2 -6 12 q8 -3 10 -10 Z" fill="#E8BC88" stroke="#7A5020" stroke-width="2"/>
  <path d="M182 130 q10 2 6 12 q-8 -3 -10 -10 Z" fill="#E8BC88" stroke="#7A5020" stroke-width="2"/>
</svg>
