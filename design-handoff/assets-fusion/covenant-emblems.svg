<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" width="640" height="180" font-family="'Nunito',sans-serif" role="img" aria-label="The four covenant emblems">
  <defs>
    <pattern id="ce-st" width="8" height="8" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#FFF7E8" opacity="0.5"/></pattern>
    <filter id="ce-g" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="ce-grd" cx="0.5" cy="0.42" r="0.6"><stop offset="0" stop-color="#241B40"/><stop offset="1" stop-color="#120E26"/></radialGradient>
  </defs>

  <!-- FLOW · living thread (mint) -->
  <g transform="translate(85,80)">
    <circle r="68" fill="none" stroke="#E8BC88" stroke-width="9" stroke-dasharray="2 9" opacity="0.7"/>
    <circle r="58" fill="url(#ce-grd)" stroke="#211B17" stroke-width="5"/>
    <circle r="58" fill="url(#ce-st)" opacity="0.6"/>
    <circle r="52" fill="none" stroke="#A87A2E" stroke-width="2.5"/>
    <g filter="url(#ce-g)" fill="none" stroke="#5BE6A4" stroke-width="6" stroke-linecap="round">
      <path d="M-30 0 Q-15 -24 0 0 Q15 24 30 0"/></g>
    <path d="M-30 0 Q-15 -24 0 0 Q15 24 30 0" fill="none" stroke="#211B17" stroke-width="2" opacity="0.5"/>
    <circle cx="30" cy="0" r="4" fill="#E8BC88"/><circle cx="-30" cy="0" r="4" fill="#E8BC88"/>
    <text y="86" text-anchor="middle" font-size="13" font-weight="900" fill="#5BE6A4" letter-spacing="1">FLOW · THREAD</text>
  </g>

  <!-- CLUTCH · held breath at the threshold (cyan) -->
  <g transform="translate(245,80)">
    <circle r="68" fill="none" stroke="#E8BC88" stroke-width="9" stroke-dasharray="2 9" opacity="0.7"/>
    <circle r="58" fill="url(#ce-grd)" stroke="#211B17" stroke-width="5"/>
    <circle r="58" fill="url(#ce-st)" opacity="0.6"/>
    <circle r="52" fill="none" stroke="#A87A2E" stroke-width="2.5"/>
    <g filter="url(#ce-g)" fill="none" stroke="#54D8FF" stroke-width="6" stroke-linecap="round">
      <path d="M-26 -26 A30 30 0 0 0 -26 26"/><path d="M26 -26 A30 30 0 0 1 26 26"/></g>
    <circle r="7" fill="#54D8FF" filter="url(#ce-g)"/><circle r="3" fill="#FFFFFF"/>
    <text y="86" text-anchor="middle" font-size="13" font-weight="900" fill="#54D8FF" letter-spacing="1">CLUTCH · BREATH</text>
  </g>

  <!-- ECHO · vigil flame (violet) -->
  <g transform="translate(405,80)">
    <circle r="68" fill="none" stroke="#E8BC88" stroke-width="9" stroke-dasharray="2 9" opacity="0.7"/>
    <circle r="58" fill="url(#ce-grd)" stroke="#211B17" stroke-width="5"/>
    <circle r="58" fill="url(#ce-st)" opacity="0.6"/>
    <circle r="52" fill="none" stroke="#A87A2E" stroke-width="2.5"/>
    <g filter="url(#ce-g)">
      <path d="M0 -28 C12 -10 12 6 0 16 C-12 6 -12 -10 0 -28 Z" fill="#A98BFF"/>
      <path d="M0 -18 C6 -8 6 4 0 10 C-6 4 -6 -8 0 -18 Z" fill="#FFF3D2"/></g>
    <rect x="-12" y="16" width="24" height="7" rx="3" fill="#E8BC88" stroke="#211B17" stroke-width="2"/>
    <path d="M-26 26 A34 34 0 0 1 26 26" fill="none" stroke="#A98BFF" stroke-width="2.5" opacity="0.6"/>
    <text y="86" text-anchor="middle" font-size="13" font-weight="900" fill="#A98BFF" letter-spacing="1">ECHO · VIGIL</text>
  </g>

  <!-- SURGE · sealed reliquary of light (gold) -->
  <g transform="translate(565,80)">
    <circle r="68" fill="none" stroke="#E8BC88" stroke-width="9" stroke-dasharray="2 9" opacity="0.8"/>
    <circle r="58" fill="url(#ce-grd)" stroke="#211B17" stroke-width="5"/>
    <circle r="58" fill="url(#ce-st)" opacity="0.6"/>
    <circle r="52" fill="none" stroke="#A87A2E" stroke-width="2.5"/>
    <circle r="30" fill="#7E2531" stroke="#211B17" stroke-width="3" filter="url(#ce-g)"/>
    <circle r="30" fill="none" stroke="#E8BC88" stroke-width="2"/>
    <path d="M6 -20 L-12 6 L0 6 L-5 22 L14 -4 L2 -4 Z" fill="#FFD24A" stroke="#FFF3D2" stroke-width="1.5" filter="url(#ce-g)"/>
    <text y="86" text-anchor="middle" font-size="13" font-weight="900" fill="#FFD24A" letter-spacing="1">SURGE · SEAL</text>
  </g>
</svg>
