<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Gizmo mini mark — neon-matched, for tiny sizes">
  <defs>
    <linearGradient id="mm-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#54D8FF"/><stop offset="0.5" stop-color="#A98BFF"/><stop offset="1" stop-color="#FF79C6"/>
    </linearGradient>
    <radialGradient id="mm-gold" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#F6DCA6"/><stop offset="0.6" stop-color="#E8BC88"/><stop offset="1" stop-color="#A87A2E"/>
    </radialGradient>
    <radialGradient id="mm-core" cx="0.42" cy="0.38" r="0.7">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="0.45" stop-color="#9CE9FF"/><stop offset="1" stop-color="#1E9ED6"/>
    </radialGradient>
    <filter id="mm-g" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- void backing -->
  <circle cx="64" cy="64" r="60" fill="#0C0A16"/>
  <!-- neon ring (game language) -->
  <circle cx="64" cy="64" r="58" fill="none" stroke="url(#mm-ring)" stroke-width="6" filter="url(#mm-g)"/>
  <circle cx="64" cy="64" r="58" fill="none" stroke="#0C0A16" stroke-width="1.5" opacity="0.5"/>
  <!-- gold-leaf core disc (codex) -->
  <circle cx="64" cy="64" r="46" fill="url(#mm-gold)" stroke="#211B17" stroke-width="4"/>
  <circle cx="64" cy="64" r="38" fill="none" stroke="#7A5020" stroke-width="2" opacity="0.7"/>
  <!-- bold ink G -->
  <path d="M87 44.7 A30 30 0 1 0 87 83.3" fill="none" stroke="#211B17" stroke-width="13" stroke-linecap="round" filter="url(#mm-g)"/>
  <path d="M64 64 L89 64" stroke="#211B17" stroke-width="13" stroke-linecap="round"/>
  <!-- cyan core spark / power node -->
  <circle cx="64" cy="64" r="9" fill="url(#mm-core)" filter="url(#mm-g)"/>
  <circle cx="64" cy="64" r="9" fill="none" stroke="#0B0914" stroke-width="2.5"/>
  <circle cx="61" cy="61" r="2.6" fill="#FFFFFF"/>
</svg>
