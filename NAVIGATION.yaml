  - "game-src-phaser/dist/ (build output)"
  - "godot/.godot/ (editor cache)"
  - "assets/ at repo root (minified Vite bundles ~4.6MB - serve them, do not read them)"
  - "*.zip at repo root (two ~10MB design exports)"
  - "art/ + design-handoff/screens*/ + design-system/assets/ raster/SVG bulk (reference by path; open individual files only when a task needs one)"
  - "docs/godot/answer-key/ wholesale (consult-only per ADR-008/ADR-012; never paste as lesson)"
  - "game-src-phaser/src/phaser/MischiefScene.ts whole-file (~65KB; read PORT_MAP-anchored slices)"
afk_entry: >-
  Read CLAUDE.md, then CONTEXT.md (§4 teaching model, §5 doc map), then docs/godot/DECISIONS.md.
  First command (host): ${GODOT_BIN:-godot} --headless --path godot --import — proves the learner
  shell still opens. Then STOP and reconcile two facts before building anything: (1) this repo's
  CLAUDE.md binds work to a paced /teach co-development contract (no building ahead of the learner,
  learning-records/ is the only progress truth); (2) this working tree is the teaching-era state,
  while every sibling lab targets a richer gizmo state (Path-A spec, ADRs 0005-0007, populated
  scenes, branch `gizmo-3d` per design-system lineage) that is not checked out here — run
  `git branch -a` / `git log --oneline -20` on the host to locate it before trusting either picture.
ecosystem_map: ECOSYSTEM-MAP.yaml
