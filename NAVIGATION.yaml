lab: gizmo
role: >-
  The playable game repo and implementation authority: a kid-friendly bullet-heaven prototype
  (Phaser/TS seed + playable web build) being rebuilt in Godot 4.7 as a co-developed teaching
  port — godot/ is the learner's workspace and the port is the curriculum (CONTEXT.md §4).
authority:
  owns: [godot/ project and its tests, mechanics port (simulation.ts -> simulation.gd), teaching artifacts (lessons/, learning-records/, docs/godot/ logs), port maps and ADRs (docs/godot/DECISIONS.md), acceptance of all sibling handoffs]
  defers: {visual: gizmo-design-system, narrative: gizmo-lore, spatial: gizmo-level-design, sonic: gizmo-audio-canon, asset_production: gizmo-asset-pipeline}
read_order:
  tier0_always:
    - {path: CLAUDE.md, why: project memory - teaching contract, commands/gates, boundaries, cost: S}
    - {path: CONTEXT.md, why: orientation keystone - domain language, architecture (Simulation/SimSpace/presenters), doc-ownership map in §5; with ADRs it wins doc conflicts, cost: S}
    - {path: docs/godot/DECISIONS.md, why: the ADR log (ADR-001..016; note ADR-011 flat-sim/2.5D stage, ADR-012 from-zero reset, ADR-016 doc governance), cost: M}
  tier1_per_task:
    - {path: GODOT-PORT.md, why: porting start point - the three inputs and the loop to reproduce, cost: S, task: any port slice}
    - {path: docs/godot/PORT_MAP.md, why: seed->Godot line-anchor tables; cite these instead of re-deriving, cost: S, task: porting a specific system}
    - {path: game-src-phaser/src/game/simulation.ts, why: mechanics source of truth (1746 lines; read the PORT_MAP-anchored slice not the whole file), cost: M, task: porting mechanics}
    - {path: learning-records/, why: the only record of learner progress; compute the next lesson from here, cost: S, task: teaching / next-lesson}
    - {path: docs/godot/LEARNING_PATH.md, why: the 6-phase lesson spine, cost: S, task: teaching / next-lesson}
    - {path: docs/godot/LESSON_LOG.md, why: checkpoint log (last entry 2026-06-15; 1 demonstrated lesson), cost: S, task: lesson bookkeeping}
    - {path: docs/godot/TRUST_BOUNDARIES.md, why: canonical-source ranking; answer-key and rescue material are reference-only, cost: S, task: deciding what to trust or copy}
    - {path: design-handoff/NARRATIVE.md, why: premise canon (ADR-013 clanker/spark-of-humanity), cost: S, task: naming / fiction / copy}
    - {path: docs/godot/BALANCE_MODEL.md, why: Gizmo-specific tuning model over the generic reference, cost: S, task: balance / tuning}
    - {path: docs/godot/ASSET_IMPORT_PLAN.md, why: asset->Godot import mapping incl. ADR-015 walk-sheet animation plan, cost: S, task: importing art or assets}
    - {path: design-handoff/FUSION-CODEX.md, why: look tokens - palette hexes, fonts, motion rules, cost: S, task: visual / HUD work}
    - {path: godot/project.godot, why: the learner's project shell (Godot 4.7, GL Compatibility, 1280x720, no main scene yet), cost: S, task: any godot/ work}
    - {path: docs/godot/DESIGN_TO_LESSON_HANDOFF.md, why: asset/integration table for lessons 0009-0012, cost: M, task: post-core lesson planning}
  tier2_rarely:
    - {path: docs/godot/answer-key/, why: verified reference port (44 small files) - consult to check direction or unblock per ADR-008/ADR-012; never paste wholesale, cost: M}
    - {path: MISSION.md, why: why/success/scope charter, cost: S}
    - {path: NOTES.md, why: teacher's working method + lesson-HTML conventions, cost: S}
    - {path: RESOURCES.md, why: annotated resource pointers, cost: S}
    - {path: DESIGN.md, why: draft design-review artifact, cost: S}
    - {path: reference/game-balance-reference.md, why: generic external balance reference (BALANCE_MODEL.md is the Gizmo mapping), cost: M}
    - {path: docs/godot/LEARNING_AUDIT.md, why: point-in-time snapshot (history, not living spec), cost: M}
    - {path: docs/godot/GODOT_AGENT_TOOLING_REVIEW.md, why: point-in-time snapshot, cost: M}
    - {path: docs/godot/UI_PANEL_VISUAL_SMOKE.md, why: point-in-time snapshot + docs/godot/visual-smoke/ captures, cost: S}
modules:
  - {path: godot/, purpose: learner's Godot 4.7 workspace - currently a bare lesson-0001 shell (scenes/scripts/tests/ui/assets/audio all empty), cost: S, when: every co-development slice}
  - {path: docs/godot/answer-key/, purpose: set-aside verified reference port (own project.godot + simulation.gd + tests + theme), cost: M, when: checking direction or unblocking only}
  - {path: game-src-phaser/, purpose: Phaser+TS seed - src/game/simulation.ts (mechanics), src/phaser/MischiefScene.ts (scene/camera ~65KB), src/ui/hud.ts + sfx.ts, cost: L, when: porting - via PORT_MAP anchors}
  - {path: design-system/, purpose: Lumen Codex design output - tokens/ components/ ui_kits/lumen-codex/ SKILL.md, cost: L, when: HUD/theme work - copy values not vibes}
  - {path: design-handoff/, purpose: art direction - NARRATIVE.md FUSION-CODEX.md art bible mockup-*.html SVG asset dirs, cost: L, when: premise or look questions}
  - {path: art/, purpose: raster source art (gouache walk sheet, title backgrounds), cost: L, when: ADR-015 animation work only}
  - {path: lessons/, purpose: self-contained HTML lessons 0001-0008 (0001 demonstrated; 0002+ teacher drafts), cost: M, when: teaching}
  - {path: learning-records/, purpose: learner-progress truth (through 0002-first-project-created.md), cost: S, when: start of any teaching session}
  - {path: index.html, purpose: playable web build entry (with root assets/ Vite bundles) - the feel reference, cost: S, when: feel check via npx serve .}
  - {path: reference/, purpose: external game-balance reference artifact, cost: M, when: tuning}
commands:
  - {name: web-seed-build, run: "cd game-src-phaser && npm ci && npm run build", from: CLAUDE.md, note: "not run in mapping sandbox (heavy install); npm/npx present there, runnable on host"}
  - {name: feel-check, run: "npx serve .", from: CLAUDE.md, note: "serves index.html playable build; interactive - run on host"}
  - {name: godot-version, run: "${GODOT_BIN:-godot} --version", from: CLAUDE.md, note: "godot binary absent in mapping sandbox (verified 2026-07-03); run on host. Target 4.7.x (ADR-017, upgraded 2026-07-03); last green run was 4.6.2.stable.mono, 4.7 re-verify pending per CONTEXT.md §6"}
  - {name: godot-import, run: "${GODOT_BIN:-godot} --headless --path godot --import", from: CLAUDE.md, note: "not runnable in mapping sandbox; run on host"}
  - {name: godot-check, run: "${GODOT_BIN:-godot} --headless --path godot --check-only --script res://scripts/simulation.gd", from: CLAUDE.md, note: "target script does not exist yet in this tree (learner has not built it); command becomes live once scripts/simulation.gd lands"}
  - {name: godot-tests, run: "${GODOT_BIN:-godot} --headless --path godot --script res://tests/run_simulation_tests.gd", from: CLAUDE.md, note: "target test does not exist yet in this tree; answer-key has its own copy for reference runs"}
gates: {file: docs/godot/PLAYTEST_CHECKLIST.md, ids: "no lettered gate ids; checklist sections cover static docs, web build, learner godot/, and answer-key", rule: "gates here are the verification commands - see CLAUDE.md 'Commands and gates' and the after-each-slice rule in its teaching contract"}
