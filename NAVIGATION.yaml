# NAVIGATION.yaml — derived navigation index for AI agents working in the gizmo game repo.
# Regenerated 2026-07-05 against the ACTIVE `gizmo-3d` branch (3D rogue-lite, Godot 4.7 Forward+).
# NOT canon: on conflict AGENTS.md / CONTEXT.md / CLAUDE.md / docs/adr win. Paths are repo-relative
# (sibling labs referenced as ../<lab>) so the index is machine-independent.
#
# BRANCH NOTE: this describes the active gizmo-3d line (Path A). The remote `main` branch is the
# older /teach 2.5D teaching line and is NOT the Path A implementation authority
# (AGENTS.md work-rules; gizmo-ecosystem.yaml game.availability). Do not merge the two blindly.
lab: gizmo
branch: gizmo-3d
role: >-
  The playable game repo and implementation authority: a 3D rogue-lite with a fixed
  Diablo-style camera where Gizmo the clanker preserves the spark of humanity under
  director-driven enemy pressure, in a gouache cosmos of lost tech. Rebuilt in Godot 4.7
  (Forward+) from a Phaser/TS seed. Default mode is bounded AFK coding-agent slices
  (CONTEXT.md operating-mode pivot 2026-07-04); the /teach lesson path is resumable history.
authority:
  owns:
    - godot/ project, scenes, scripts, and its five test suites
    - active mechanics port (game-src-phaser/src/game/simulation.ts -> godot/scripts/simulation.gd)
    - Path A build target (docs/path-a-shattered-meridian-spec.md)
    - locked decisions (docs/adr/0001-0013)
    - acceptance of all sibling handoffs (theme, assets, audio, level data, copy)
  defers: {narrative: gizmo-lore, visual: gizmo-design-system, spatial: gizmo-level-design, sonic: gizmo-audio-canon, raw_soundtrack_sources: gizmo-soundtrack, asset_production: gizmo-asset-pipeline}
read_order:
  tier0_always:
    - {path: AGENTS.md, why: governing operating directive - clean-slate 3D rule, AFK-agent default, no-wave rule, gizmo-3d branch authority, cost: S}
    - {path: CONTEXT.md, why: orientation keystone - the game, the loop (Path A beacon-rekindle), v1 scope, truth map; wins doc conflicts, cost: M}
    - {path: CLAUDE.md, why: Claude agent-development memory - skills routing, GodotPrompter grounding, Godot rules, commands/gates, teaching contract (explicit /teach only), cost: M}
  tier1_per_task:
    - {path: docs/adr/, why: locked decisions 0001-0013 (0001 Sparks/HP/Spark-of-Humanity distinct; 0003 director-not-waves; 0005 beacon-rekindle replaces timer; 0006 spatial pressure zones; 0007 guard-over-HP; 0009 Godot 4.7; 0010 hades-clone pivot; 0011 ability-input-router; 0012 spark-surge-meter; 0013 benefactor-seam-role-ids), cost: M, task: any design decision}
    - {path: docs/path-a-shattered-meridian-spec.md, why: the active v1 build target (traverse a wounded island, rekindle a cold Beacon), cost: M, task: building Path A}
    - {path: godot/scripts/simulation.gd, why: the ported headless simulation (518 lines) - the live rules, cost: M, task: mechanics work}
    - {path: game-src-phaser/src/game/simulation.ts, why: mechanics source of truth (1746 lines) - port/parity anchor, cost: L, task: porting or checking parity}
    - {path: reference/game-balance-reference.md, why: game-agnostic balance foundation (TTK bands, spawn budgets, upgrade math) - the tuning north star, cost: M, task: balance / tuning}
    - {path: design-handoff/NARRATIVE.md, why: premise/story canon (clanker preserving the spark of humanity), cost: S, task: naming / fiction / copy}
    - {path: design-handoff/ART_DIRECTION.md, why: the look (gouache cosmos, brass UI); design-handoff/gizmo-hud.png is the canonical visual target, cost: S, task: visual / HUD work}
    - {path: godot/project.godot, why: project shell (Godot 4.7 Forward+, main.tscn wired via uid, WASD+pad input map, Jolt 3D physics, 1280x720), cost: S, task: any godot/ work}
    - {path: docs/afk/queue/INDEX.md, why: current AFK queue frontier, dependencies, and model routing; local tracker until GitHub import/sync, cost: S, task: picking agent work}
    - {path: docs/reference/shattered-meridian-region-graph.json, why: world-grammar region graph (HEARTH / Hearthwake Basin) behind Path A, cost: S, task: level / spatial work}
    - {path: ../gizmo-audio-canon/canon/godot-handoff.yaml, why: promoted audio conversion/import law before any runtime audio enters godot/audio, cost: S, task: audio handoff}
    - {path: ../gizmo-soundtrack/README.md, why: raw soundtrack source pack orientation (MP4 sources, composition docs, not runtime imports), cost: S, task: soundtrack source lookup}
    - {path: tools/godot/run_all_checks.sh, why: the one-command verification gate, cost: S, task: verifying any godot/ change}
  tier2_rarely:
    - {path: MISSION.md, why: charter - why / success / scope, cost: S}
    - {path: README.md, why: repo layout + the verify command, cost: S}
    - {path: NOTES.md, why: teacher working method + lesson-HTML conventions (teaching history), cost: S}
    - {path: RESOURCES.md, why: annotated resource pointers, cost: S}
    - {path: lessons/, why: self-contained /teach lesson HTML 0001-0020 (resumable history), cost: M, task: teaching only}
    - {path: learning-records/, why: learner-progress records 0001-0020 (history unless teaching resumes), cost: S, task: teaching only}
    - {path: docs/_archive/, why: pre-reset pipeline / meshy / audio logs (archaeology only), cost: L}
modules:
  - {path: godot/, purpose: active Godot 4.7 project - scripts/ (simulation, gizmo, camera_rig, game_controller, hud, end_screen), scenes/ (main, hud, enemy, gizmo, spark, end_screen + hud_theme.tres), tests/ (5 runners), assets/ (fonts + gizmo.glb), cost: M, when: every slice}
  - {path: game-src-phaser/, purpose: Phaser+TS seed - src/game/simulation.ts is the mechanics source of truth, cost: L, when: porting / parity}
  - {path: design-handoff/, purpose: art direction + premise - NARRATIVE.md, ART_DIRECTION.md, gizmo-hud.png, cost: L, when: look or premise questions}
  - {path: docs/, purpose: adr/ (0001-0013), path-a-shattered-meridian-spec.md, afk/queue current local tracker, reference/region-graph, _archive/ logs, cost: M, when: decisions / spec / ticket pickup}
  - {path: tools/, purpose: godot/run_all_checks.sh gate; blender/ island+glb tooling; audio/ sfx generation, cost: S, when: verify / asset gen}
  - {path: ../gizmo-audio-canon/, purpose: sonic canon, AudioContract, cue maps, conversion/import handoff law; owns audio meaning and runtime-ready derivative rules, cost: M, when: soundtrack / ambience / SFX work}
  - {path: ../gizmo-soundtrack/, purpose: raw soundtrack source pack (61 MP4 cue files plus composition/map docs); source material only, not Godot-ready runtime audio, cost: L, when: locating soundtrack media}
  - {path: reference/, purpose: game-balance-reference.md (dimension-agnostic balance), cost: M, when: tuning}
  - {path: lessons/ + learning-records/, purpose: /teach history (lessons 0001-0020, records 0001-0020), cost: M, when: teaching resumes}
  - {path: index.html, purpose: playable web feel reference (root assets/ Vite bundles), cost: S, when: feel check via npx serve .}
commands:
  - {name: full-gate, run: "tools/godot/run_all_checks.sh", from: README/AGENTS, note: "import -> --check-only on 6 runtime scripts plus 5 test runners -> run 5 headless test suites -> smoke main.tscn; GODOT_BIN overrides the binary"}
  - {name: godot-version, run: "${GODOT_BIN:-godot} --version", note: "target Godot 4.7 stable, Forward+ renderer (ADR-0009)"}
  - {name: godot-import, run: "${GODOT_BIN:-godot} --headless --path godot --import"}
  - {name: godot-tests, run: "${GODOT_BIN:-godot} --headless --path godot --script res://tests/run_simulation_tests.gd", note: "five suites: run_simulation, run_balance, run_game_controller, run_hud, run_end_screen"}
  - {name: web-feel, run: "npx serve .", note: "serves index.html playable build - feel reference only"}
  - {name: web-build, run: "npm --prefix game-src-phaser run build", note: "Phaser seed build (feel reference)"}
gates:
  file: tools/godot/run_all_checks.sh
  ids: none
  rule: "verification IS the gate - the full-gate script must exit 0 (import + syntax on 6 scripts + 5 headless suites + main-scene smoke). See AGENTS.md 'verify before claiming completion'."
seams:
  # gizmo consumer side, verified on gizmo-3d 2026-07-04. Sibling paths are ../<lab> relative to this repo's parent.
  gizmo-design-system:
    consumes: ["published HUD Theme witness -> godot/scenes/hud_theme.tres (PRESENT on gizmo-3d)"]
    produces: ["read-only game truth for their extraction: CONTEXT.md, godot/ runtime probes (evidence, never canon)"]
    mechanism: "explicit publish only (their ADR 0002: make publish-godot-theme wrapping tools/gen_godot_theme.py); never hand-edit the generated .tres"
    key_files: ["godot/scenes/hud_theme.tres", "../gizmo-design-system/tools/gen_godot_theme.py", "../gizmo-design-system/canon/CANON.md", "../gizmo-design-system/canon/concordance.yaml"]
  gizmo-asset-pipeline:
    consumes: ["proven asset installs (wrapper .tscn + GLB + metadata) -> godot/assets/<category>/<asset_id>/ (only fonts/ + gizmo.glb present; no wrapper installs yet)"]
    produces: ["install acceptance environment: headless import + all five test suites must stay green (revert on red, additive-only per their canon/policy.yaml)"]
    mechanism: "auto-handoff only with a validating promotion report; game_repo pinned in their canon/policy.yaml"
    key_files: ["godot/assets/", "../gizmo-asset-pipeline/canon/policy.yaml", "../gizmo-asset-pipeline/canon/godot-import.yaml"]
  gizmo-audio-canon:
    consumes: ["converted runtime audio (OGG music/ambience, WAV short SFX) -> godot/audio/ (EMPTY BY DESIGN; .gitkeep + README only)"]
    produces: ["game-state driver seam for their AudioDirector concept (Simulation snapshot + events)"]
    mechanism: "explicit scripted handoff (their canon/godot-handoff.yaml); raw Lyria/source media never lands in godot/audio/"
    key_files: ["godot/audio/", "../gizmo-audio-canon/canon/godot-handoff.yaml", "../gizmo-audio-canon/canon/cue-map.yaml", "../gizmo-soundtrack/"]
  gizmo-level-design:
    consumes: ["data-only route graphs (vs their validators/route_graph_schema.json) + region grammar; no standing landing dir - scenes are baked in-repo after handoff"]
    produces: ["locked-mechanic + Path A spec ground truth (docs/path-a-shattered-meridian-spec.md, ADRs 0005-0008); docs/reference/shattered-meridian-region-graph.json is the shared world-grammar source"]
    mechanism: "lab returns data (graphs / schemas / validator reports), never authors Godot scenes here (their ADR 0001, gate L12)"
    key_files: ["docs/reference/shattered-meridian-region-graph.json", "../gizmo-level-design/validators/route_graph_schema.json", "../gizmo-level-design/canon/LEVEL_CANON.md"]
  gizmo-lore:
    consumes: ["copy / terms / glossary rulings returned as text (no code landing path); premise alignment flows through design-handoff/NARRATIVE.md"]
    produces: ["narrative ground truth they snapshot in their sources/gizmo-docs/"]
    mechanism: "lore returns copy and terminology; it never mutates this repo; on conflict they write reconciliation notes lab-side"
    key_files: ["design-handoff/NARRATIVE.md", "../gizmo-lore/canon/LORE_CANON.md", "../gizmo-lore/canon/glossary.yaml"]
do_not_load:
  - "game-src-phaser/node_modules/ (absent until npm ci) + game-src-phaser/dist/ (build output)"
  - "godot/.godot/ (editor cache)"
  - "assets/ at repo root (minified Vite bundles ~4.6MB - serve them, do not read them)"
  - "godot/assets/gizmo.glb + fonts + *.import (binaries; reference by name/size only)"
  - "docs/_archive/ wholesale (pre-2026-06-20-reset pipeline logs; archaeology only)"
  - "game-src-phaser/src/phaser/*.ts whole-file (large scene files; read PORT-anchored slices)"
afk_entry: >-
  Read AGENTS.md, then CONTEXT.md (the loop + v1 scope + truth map), then CLAUDE.md; consult
  gizmo-ecosystem.yaml to route any cross-domain work by specialty. First command:
  tools/godot/run_all_checks.sh - it imports godot/, syntax-checks runtime scripts plus test
  runners, runs all five headless suites, and smoke-loads main.tscn; green is the starting line. The active branch is
  gizmo-3d (Path A, Godot 4.7 Forward+); do NOT treat remote main as the implementation line, and
  do not revive 2.5D/sprite scaffolding (AGENTS.md stale-history rule). Default mode is bounded AFK
  agent slices with executable success criteria and tracker/Daily handoff; enter /teach only when the
  user asks. Raw soundtrack sources are in ../gizmo-soundtrack, but audio meaning and runtime handoff
  stay owned by ../gizmo-audio-canon. Current AFK frontier lives in docs/afk/queue/INDEX.md:
  GZ-001, GZ-010, GZ-014, GZ-017, GZ-018, plus service lanes GZ-030/GZ-031. Keep scope
  inside Path A until it ships; write a reconciliation note before any cross-domain promotion.
ecosystem_map: gizmo-ecosystem.yaml
