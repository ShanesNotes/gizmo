current_folder: game
schema: gizmo.clean_canvas.ecosystem.v1
updated: '2026-07-04'
rule: Route by specialty. Sibling clean canvases are sources of truth for their domains;
  the game repo is the playable implementation.
global_directive: Do not invent cross-domain canon in the wrong folder. If a task
  crosses domains, read the owning folder first and create a reconciliation note before
  promotion.
folders:
  game:
    path: /home/ark/gizmo
    availability: >-
      2026-07-04 note: this checkout is on the active game branch gizmo-3d. The
      remote main branch currently carries older teaching-line material and must not
      be treated as the Path A implementation authority without a human branch
      decision.
    role: playable Godot game and implementation authority
    owns:
    - Godot project
    - active mechanics implementation
    - tests
    - implementation handoffs
    read_first:
    - AGENTS.md
    - CONTEXT.md
    - CLAUDE.md
  lore:
    path: /home/ark/gizmo-lore
    role: lorekeeper / narrative continuity clean canvas
    owns:
    - backstory
    - premise
    - glossary
    - fiction-to-mechanics language
    - copy rules
    read_first:
    - AGENTS.md
    - canon/LORE_CANON.md
    - canon/glossary.yaml
  visual_symbolic_design:
    path: /home/ark/gizmo-design-system
    role: visual-symbolic design canon clean canvas
    owns:
    - visual-symbolic canon
    - motifs
    - bindings
    - design tokens
    - UI/HUD witnesses
    - shader/look-pipeline matrix (stylization stack -> motif/token/gate mapping)
    - painterly render-target architecture decision (CompositorEffect vs per-material)
    read_first:
    - AGENTS.md
    - canon/CANON.md
    - canon/acceptance-gates.md
    - canon/shader-matrix.yaml
  level_design:
    path: /home/ark/gizmo-level-design
    role: spatial-symbolic level/map design clean canvas
    owns:
    - route grammar
    - landmark taxonomy
    - pressure zones
    - encounter beats
    - level witnesses
    - acceptance gates (L1-L12)
    - stdlib validators (make validate)
    - handoff schemas (route_graph_schema.json)
    read_first:
    - AGENTS.md
    - canon/LEVEL_CANON.md
    - canon/acceptance-gates.md
  audio_canon:
    path: /home/ark/gizmo-audio-canon
    role: audio engineer / sonic canon clean canvas
    owns:
    - soundtrack cue map
    - ambience grammar
    - SFX prompt grammar
    - Godot audio handoff rules
    read_first:
    - AGENTS.md
    - canon/AUDIO_CANON.md
    - canon/acceptance-gates.md
  asset_pipeline:
    path: /home/ark/gizmo-asset-pipeline
    role: asset technical director / canon-to-asset manufacturing lab
    owns:
    - asset briefs
    - prompt provenance
    - Meshy workflow
    - Blender cleanup
    - Godot import gates
    - promotion reports
    read_first:
    - AGENTS.md
    - canon/ASSET_PIPELINE_CANON.md
    - canon/acceptance-gates.md
routing:
  story_backstory_terms_copy: lore
  visual_symbols_palette_ui_hud: visual_symbolic_design
  shaders_painterly_look_gouache_render_target: visual_symbolic_design
  maps_routes_landmarks_pressure_zones: level_design
  soundtrack_ambience_sfx_mix: audio_canon
  prompts_image_generation_meshy_blender_godot_assets: asset_pipeline
  godot_code_tests_scenes_runtime: game
cross_domain_protocol:
- Read this gizmo-ecosystem.yaml first.
- Read the target folder AGENTS.md next.
- Read the owning canon before editing derived artifacts.
- If two folders disagree, create an extraction/reconciliation note; do not silently
  pick one.
- Generated outputs are draft witnesses until the owning canon promotes them.
cross_domain_artifacts:
  # Shared registry so each specialty can find work that crosses folder boundaries: where it lives,
  # who HOSTS it, who OWNS each facet, and its promotion status. Hosting != ownership; read the
  # owner's canon before acting. A shader/asset becomes a look-rule only when its owner promotes it.
  registry_rule: hosting folder stores the bytes; the owning folder adjudicates meaning and promotion.
  artifacts:
  - id: shader-look-matrix
    title: shader / look-pipeline matrix (stylization stack -> motif/token/gate mapping)
    location: /home/ark/gizmo-design-system/canon/shader-matrix.yaml
    hosted_by: visual_symbolic_design
    owner: visual_symbolic_design
    consumers: [asset_pipeline, game, level_design]
    status: canon-mapping; individual shader adoptions proposed/candidate (render-target is a TARGET, gate G12)
  - id: meridian-concordance
    title: the Meridian Concordance (visual canon -> exact sibling ids; lore/level/audio/asset bindings with falsifiable pass/reject)
    location: /home/ark/gizmo-design-system/canon/concordance.yaml
    hosted_by: visual_symbolic_design
    owner: visual_symbolic_design   # owns the VISUAL half only; sibling ids are read-only citations (ADR 0003)
    consumers: [lore, level_design, audio_canon, asset_pipeline, game]
    evidence: /home/ark/gizmo-design-system/extraction/cross-domain-binding-ledger.md
    reconciliation: /home/ark/gizmo-design-system/extraction/reconciliation-2026-07-03-concordance.md
    status: canon-mapping; entries candidate until each sibling promotes its side (gates G13/G14)
  - id: gouache-storybook-shader-research
    title: Godot art-style assets research (gouache/storybook stylization; 48 link-verified assets)
    location: /home/ark/gizmo-level-design/archive/extraction/godot-art-style-assets-research/  # digest: extraction/digests/godot-art-style-assets-digest.md
    hosted_by: level_design
    owners: [visual_symbolic_design, asset_pipeline]   # look-facets / manufacturing-facets
    consumers: [visual_symbolic_design, asset_pipeline, game, level_design]
    reconciliation: /home/ark/gizmo-design-system/extraction/shader-research-reconciliation.md
    status: research-evidence (not canon; routed per-asset by owning_sibling)
