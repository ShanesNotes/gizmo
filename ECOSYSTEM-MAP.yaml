authority_matrix:
  # domain → owning folder. Consumers defer; on conflict write an extraction/ reconciliation note in the consuming lab — never silently pick a side.
  game_logic_and_mechanics: {owner: gizmo, source_of_truth: game-src-phaser/src/game/simulation.ts, note: port target godot/scripts/simulation.gd}
  visual_symbolic: {owner: gizmo-design-system, meaning: canon/, values: tokens/tokens.json}
  narrative: {owner: gizmo-lore, note: premise canon snapshot flows via gizmo/design-handoff/NARRATIVE.md}
  spatial: {owner: gizmo-level-design}
  sonic: {owner: gizmo-audio-canon}
  asset_production: {owner: gizmo-asset-pipeline}

