seam_matrix:
  # Directional flows. current_state = what was verified on disk 2026-07-03. Each lab's NAVIGATION.yaml has the detailed version.
  design-system_to_gizmo:
    what: Godot HUD theme witness
    mechanism: explicit publish — make publish-godot-theme → tools/gen_godot_theme.py --game (design-system ADR 0002)
    target: gizmo/godot/scenes/hud_theme.tres
    current_state: target ABSENT — publish proven against branch gizmo-3d, not this tree; engine-version hold RESOLVED 2026-07-03 (game canon upgraded to 4.7 per ADR-017, now matches the handoff pack's 4.7)
  asset-pipeline_to_gizmo:
    what: wrapper .tscn + GLB installs
    mechanism: handoff stage only — validating promotion report (briefs/**/<asset_id>.promotion.yaml) → headless import + game tests → revert on red; additive-only
    target: gizmo/godot/assets/{characters,enemies,landmarks,props,world_kits}/<asset_id>/
    current_state: target dirs exist, EMPTY (.gitkeep only); no promotion reports yet; queue 14/14 pending
  audio-canon_to_gizmo:
    what: AudioContract interface + converted runtime audio (OGG music/ambience, WAV short SFX)
    mechanism: explicit handoff — contract in gizmo-audio-canon/canon/audio-contract.yaml (enums + 6 methods; sim never names files/buses/dB — gate A13); conversion per canon/godot-handoff.yaml, deterministic + lockfile-hashed
    target: gizmo/godot/audio/
    current_state: target EMPTY BY DESIGN (confirmed); cited grounding evidence gizmo/godot/_quarantine/2026-06-21-pre-art-refactor/ is ABSENT from this tree (see risks.R1)
  level-design_to_gizmo:
    what: data-only bundle — validated route graphs, zone/landmark/beat data, pole+register and modular-kit manifests
    mechanism: one-way data seam (level-design ADR 0001, gate L12); graphs validate against validators/route_graph_schema.json
    target: none standing — game repo bakes scenes after handoff
    current_state: nothing landed yet; 7 of 8 living-reference probes into gizmo/ dangle (see risks.R1)
  lore_to_gizmo:
    what: copy, terms, microcopy per canon/copy-rules.yaml
    mechanism: explicit handoff of text; lore never mutates the game repo
    target: none standing (by design)
    current_state: zero lore-authored copy in the game repo yet; premise flows via design-handoff/NARRATIVE.md, which has drifted from lore's snapshot in both directions
  gizmo_to_all_labs:
    what: read-only game truth
    mechanism: labs read gizmo/CONTEXT.md (+ godot/ tree) or hold dated snapshots in their sources/
    current_state: CAUTION — this working tree lacks the richer state most lab snapshots cite (risks.R1); labs must reconcile before trusting either picture
  level-design_x_audio-canon:
    what: the audio bridge — level_beat_id/pressure_role_id/encounter_beat_id ↔ ZoneState + zone→cue bindings
    mechanism: bilateral — level-design/canon/audio-integration.yaml + make validate-audio-integration (cross-repo id resolution) ↔ audio-canon/canon/zone-binding.yaml (15 ZoneStates, ids cross-checked by validate_all.py)
    current_state: zero id-drift verified; promotion asymmetry — audio side promoted, level side draft until cues auditioned
  design-system_x_siblings:
    what: concordance projections (see id_namespaces) + shader research rulings
    mechanism: candidate entries + evidence ledger + reconciliation notes; never out-promotes a sibling's own entry
    current_state: all candidate; open items — ledger §5.3 region naming, four unplaced audio zone states
  lore_x_level-design:
    what: region graph / world structure joint ownership
    mechanism: lore's canon/world-structure.md regions 2-5 explicitly draft pending level-design reconciliation; spine vocabulary reconciled in extraction notes both sides
    current_state: only Region 1 (Hearthwake) attested; First Hearth naming blocked
  lore_to_asset-pipeline:
    what: taste constraints + forbidden language
    mechanism: projected into asset-pipeline/canon/lore-bindings.yaml; validator-enforced forbidden_language; conflicts return as extraction notes
    current_state: live citation verified (lore-bindings cites lore canon, concordance X-P2, ruling D6)
  audio-canon_to_asset-pipeline:
    what: the hook seam — SFX event ids + surface enums for animation contact frames
    mechanism: wrappers carry Call Method Track contact-frame keys + metadata/surface; event-id-only per asset-pipeline/canon/sfx-coupling.yaml (Audio Playback Tracks banned)
    current_state: contract files verified both sides; no wrappers built yet

risks:
  # Pre-AFK blockers and cautions, in priority order. R1 and R2 need HUMAN decisions before any unattended run.
  R1_working_tree_drift:
    finding: the gizmo checkout is the teaching-era state; path-a-shattered-meridian-spec.md, ADRs 0005/0006/0007, populated godot/scenes/main.tscn, godot/_quarantine/2026-06-21-pre-art-refactor/, and any shipped gizmo.glb are ABSENT — yet every lab's canon/witnesses cite them as game truth. Design-system lineage names branch `gizmo-3d`; lore holds snapshots of the missing docs in sources/gizmo-docs/.
    action: on the host, run `git branch -a` / `git log --oneline -20` in gizmo/, locate and reconcile the richer state BEFORE any AFK run. Do not let an unattended agent "fix" labs to match the stale tree, or vice versa.
  R2_teaching_contract_vs_afk:
    finding: gizmo/CLAUDE.md + CONTEXT.md §4 bind building to the paced /teach co-development contract (no building ahead of the learner; learning-records/ is the only progress truth; editor-first; no full port in one lesson). An obedient AFK agent should refuse to build game code here.
    action: explicitly rescope or suspend the teaching contract in gizmo/CLAUDE.md for AFK runs (owner decision), or scope AFK work to the labs only.
  R3_sandbox_mount_truncation:
    finding: the cowork sandbox mount served truncated/stale reads of same-day-edited files in at least design-system, level-design, audio-canon, and asset-pipeline (validators, tokens.json, concordance.yaml, QUEUE.yaml, briefs). All suspect files verified intact host-side.
    action: run every validator on the Windows host. Treat sandbox-mount validation failures on recently edited files as suspect until Read-verified.
  R4_gizmo_glb_single_copy:
    finding: the only gizmo.glb on disk is the lab snapshot gizmo-asset-pipeline/sources/current-assets/gizmo.glb (12.7MB); the game-repo copy the q04 brief calls authoritative does not exist in this tree.
    action: reconcile with R1 before the animation-gap queue item runs.
  R5_stale_doc_drift:
    findings:
      - audio gate count — gates are A1-A14; CLAUDE.md and several reference docs still say A12
      - asset-pipeline canon/godot-import.yaml legacy_note cites godot/assets/world_kits/clockwork_observatory/ which does not exist
      - RESOLVED 2026-07-03: design-system handoff pack asserted Godot 4.7 vs the old game canon 4.6.x; game canon upgraded to 4.7 (ADR-017), versions now agree (publish still held on the branch-drift issue R1, not on version)
      - lore snapshots vs living gizmo docs drifted in both directions (CONTEXT.md +27 lines; NARRATIVE.md differs from line 1)
      - gizmo/CLAUDE.md references AGENTS.md "when present" — absent; ecosystem yaml lists it as read-first
    action: cheap doc fixes; none blocking, all confusing to an unattended agent.
  R6_everything_candidate:
    finding: all 16 concordance entries candidate; most of lore canon/ draft-status (32/33 glossary terms); level-side audio bindings draft until auditioned; no theme published, no assets installed, no audio converted.
    action: expected for clean-canvas labs — AFK agents must check per-entry status fields, not assume promoted.

afk_boot:
  # Recommended boot for an unattended run opened in gizmo/ (/goal + ultracode + /loop), generalizing the one lab already built for AFK (asset-pipeline docs/AFK_RUNBOOK.md).
  step_0_human_preflight:
    - resolve R1 (branch state) and R2 (teaching contract) — these are owner decisions, not agent work
    - run each folder's validator on the host; green-or-documented-gap is the starting line
  step_1_orient: read gizmo/CLAUDE.md → gizmo/NAVIGATION.yaml → this file
  step_2_route: pick work → find owning domain in authority_matrix → open that folder's NAVIGATION.yaml → obey its afk_entry verbatim
  step_3_loop_discipline: # transferable pattern distilled from gizmo-asset-pipeline
    - one machine-readable queue file as single source of run progress; blocked items never stall the loop
    - machine-readable policy law over prose, with explicit stop_conditions vs never_stall_on
    - ledger-before-use for every spend; no-retry-spend on reject; 3-strike circuit breaker per item
    - proof-at-camera with a degradation chain — never fake a pass, never halt on missing display
    - cross-repo writes only behind a validating report, verified by target-repo tests, reverted on red
    - per-run ledger dir (RUN.md, cost ledger, QUESTIONS.md as non-blocking escalation, HALT.md only for true stops)
    - preflight gate before any work; red-before-install → HALT
  step_4_close_each_slice: run the owning folder's validator (host-side); append evidence; on cross-domain conflict write an extraction/ reconciliation note in the consuming lab — never silently pick a side

do_not_load:
  # Global bulk-load bans; each NAVIGATION.yaml has the folder-specific list.
  - "**/node_modules/, **/dist/, godot/.godot/"
  - "**/generated/ (git-ignored drafts), **/archive/ (use extraction/digests/)"
  - "gizmo-level-design/sources/world_map.png"
  - "media binaries anywhere (GLB/PNG/MP4/WAV/OGG) — inventory by name/size only"
  - "gizmo/docs/godot/answer-key/ (consult-only), **/previews/ (derived witnesses)"
