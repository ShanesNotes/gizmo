<!-- @dsCard group="Components" viewport="700x420" name="Core — buttons, panels, pills, meters" subtitle="Action controls + page-apparatus primitives" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: radial-gradient(120% 90% at 50% 16%, #1C1540, #130E2A, #0A0814); font-family: var(--font-body); color: var(--lumen); }
  .stip { position: fixed; inset: 0; opacity: .4; background-image: radial-gradient(rgba(232,188,136,.14) 1px, transparent 1px); background-size: 15px 15px; pointer-events: none; }
  .wrap { position: relative; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
  .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .lab { font-family: var(--font-manuscript); font-weight: 700; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold-leaf); width: 100%; margin-bottom: -8px; }
</style>
</head>
<body>
<div class="stip"></div>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, Panel, Pill, Keycap, Meter, Seal, Eyebrow } = window.GizmoTheLumenCodexDesignSystem_512f7f;
  function Demo() {
    return (
      <React.Fragment>
        <div className="row">
          <span className="lab">Buttons</span>
          <Button variant="primary">RUN IT BACK</Button>
          <Button variant="surge">BOOST</Button>
          <Button variant="alt">Title</Button>
          <Button variant="seal" iconLeft={<span>↻</span>}>Reroll Spark</Button>
          <Button variant="ghost">Skip</Button>
          <Button variant="primary" disabled>Locked</Button>
        </div>
        <div className="row">
          <span className="lab">Panels &amp; pills</span>
          <Panel eyebrow="Covenant" style={{ width: 240 }}>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              <Pill dot="var(--clutch)" count={3}>Pulse Driver</Pill>
              <Pill dot="var(--flow)" count={2}>Spark Magnet</Pill>
              <Pill sealed count="✦">Echo Coil</Pill>
            </div>
          </Panel>
          <Panel tone="danger" eyebrow="Vigil" style={{ width: 180 }}>
            <Eyebrow color="var(--echo)">6:12 remaining</Eyebrow>
          </Panel>
        </div>
        <div className="row">
          <span className="lab">Meters &amp; seals</span>
          <div style={{ width: 220, display: 'flex', flexDirection: 'column', gap: 8 }}>
            <Meter fill={0.72} xp />
            <Meter fill={0.88} hue="var(--clutch)" />
            <Meter fill={0.6} hue="linear-gradient(90deg,var(--coral),var(--surge))" />
          </div>
          <Keycap>1</Keycap><Keycap>2</Keycap><Keycap>↻</Keycap>
          <Seal size={26} glow>✦</Seal>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
