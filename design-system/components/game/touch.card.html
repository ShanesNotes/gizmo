<!-- @dsCard group="Components" viewport="700x440" name="Touch — joystick, Snap-Boost, cluster" subtitle="Re-skinned shipping touch scheme; Boost timing states" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: radial-gradient(120% 90% at 50% 16%, #1C1540, #130E2A, #0A0814); font-family: var(--font-body); color: var(--lumen); }
  .stip { position: fixed; inset: 0; opacity: .4; background-image: radial-gradient(rgba(232,188,136,.14) 1px, transparent 1px); background-size: 15px 15px; pointer-events: none; }
  .wrap { position: relative; padding: 24px; display: flex; flex-direction: column; gap: 24px; }
  .row { display: flex; gap: 22px; align-items: flex-end; flex-wrap: wrap; }
  .lab { font-family: var(--font-manuscript); font-weight: 700; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold-leaf); width: 100%; margin-bottom: -12px; }
  .cap { font-size: 10px; font-weight: 900; letter-spacing: .4px; color: var(--lumen-dim); text-align: center; margin-top: 6px; }
  .it { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
<div class="stip"></div>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const NS = window.GizmoTheLumenCodexDesignSystem_512f7f;
  const { Joystick, BoostButton, TouchControls } = NS;
  const states = ['default', 'snap-window', 'queued', 'scooping', 'cooling', 'disabled'];
  function Demo() {
    return (
      <React.Fragment>
        <div className="row">
          <span className="lab">Joystick — drag the live one</span>
          <div className="it"><Joystick size={112} interactive /><div className="cap">fixed · live</div></div>
          <div className="it"><Joystick size={94} dx={0.6} dy={-0.45} interactive={false} /><div className="cap">held · small (94/44)</div></div>
          <div className="it"><Joystick size={112} variant="floating" interactive={false} /><div className="cap">floating (A/B)</div></div>
        </div>
        <div className="row">
          <span className="lab">Boost — the six snap-timing states</span>
          {states.map((s) => (
            <div className="it" key={s}>
              <BoostButton state={s} cooldown={s === 'cooling' ? 0.4 : 0} />
              <div className="cap">{s}</div>
            </div>
          ))}
        </div>
        <div className="row">
          <span className="lab">TouchControls — the safe-area cluster</span>
          <div style={{ position: 'relative', width: 360, height: 150, borderRadius: 16, overflow: 'hidden', background: 'rgba(20,15,34,.5)', border: '1px solid rgba(232,188,136,.2)' }}>
            <TouchControls Joystick={Joystick} BoostButton={BoostButton} small variant="fixed" boostState="snap-window" absolute={false} style={{ position: 'absolute', left: 14, right: 14, bottom: 14 }} />
          </div>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
