<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: radial-gradient(120% 90% at 50% 16%, #1C1540, #130E2A, #0A0814); font-family: var(--font-body); color: var(--lumen); }
  .stip { position: fixed; inset: 0; opacity: .4; background-image: radial-gradient(rgba(232,188,136,.14) 1px, transparent 1px); background-size: 15px 15px; pointer-events: none; }
  .wrap { position: relative; padding: 24px; display: flex; flex-direction: column; gap: 22px; }
  .row { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
  .lab { font-family: var(--font-manuscript); font-weight: 700; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold-leaf); width: 100%; margin-bottom: -10px; }
</style>
</head>
<body>
<div class="stip"></div>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { UpgradeCard, CovenantRoundel, StatCell, BreathRow, VerdictBar } = window.GizmoTheLumenCodexDesignSystem_512f7f;
  const B = "../../assets/sprites";
  function Demo() {
    return (
      <React.Fragment>
        <div className="row">
          <span className="lab">Upgrade cards — rarity ladder</span>
          <UpgradeCard rarity="rare" name="Pulse Driver" hotkey="1" iconIndex={2}
            desc="Your pulse fires a second beat on every shot." statLabel="Fire Rate" statValue="+18%"
            iconSrc={B + "/icons.svg"} width={260} />
          <UpgradeCard rarity="epic" name="Nova Bloom" hotkey="2" iconIndex={5}
            desc="Level-up Novas leave a burning bloom that melts shapes." statLabel="Blast Area" statValue="+30%"
            iconSrc={B + "/icons.svg"} width={260} />
          <UpgradeCard rarity="evolve" name="Echo Coil" hotkey="3" iconIndex={3}
            desc="Echo windows now chain into a Surge burst. Evolved." statLabel="Evolved" statValue="MAX"
            iconSrc={B + "/icons.svg"} width={260} />
        </div>
        <div className="row">
          <span className="lab">Covenant roundels · stats · breath</span>
          <CovenantRoundel index={0} fill={0.54} size={96} src={B + "/covenant-emblems.svg"} />
          <CovenantRoundel index={1} fill={0.88} size={96} src={B + "/covenant-emblems.svg"} />
          <CovenantRoundel index={3} fill={1} size={96} src={B + "/covenant-emblems.svg"} />
          <div style={{ display: 'flex', gap: 8 }}>
            <StatCell label="Rank" value="VII" hue="var(--flow)" />
            <StatCell label="Power" value="×3" hue="var(--echo)" />
            <StatCell label="Reliquary" value="4" hue="var(--surge)" />
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            <BreathRow total={5} kept={4} />
            <VerdictBar count={3} total={5} width={300} />
          </div>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
