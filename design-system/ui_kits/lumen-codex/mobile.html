<!-- @dsCard group="Lumen Codex Game" viewport="430x880" name="Portrait HUD + touch controls" subtitle="Fluid mobile HUD — joystick drives Gizmo, Boost cycles its snap states" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Gizmo — Portrait HUD</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; height: 100%; background: #08060f; overflow: hidden; }
  .phone { position: relative; width: 390px; height: 844px; border-radius: 44px; overflow: hidden;
    background: #000; border: 10px solid #1a1422;
    box-shadow: 0 40px 120px rgba(0,0,0,.6), inset 0 0 0 2px rgba(232,188,136,.18); }
  .notch { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 120px; height: 22px; border-radius: 99px; background: #000; z-index: 200; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="kit-common.jsx"></script>
<script type="text/babel" src="HudPortrait.jsx"></script>
<script type="text/babel">
  const { useState, useEffect } = React;

  const PRESETS_M = {
    full:    { showEntities: true,  showStipple: true,  showFrame: true,  covenantLabels: true,  panelOpacity: 0.82, clusterSize: 62 },
    calm:    { showEntities: false, showStipple: true,  showFrame: true,  covenantLabels: false, panelOpacity: 0.70, clusterSize: 58 },
    minimal: { showEntities: false, showStipple: false, showFrame: true,  covenantLabels: false, panelOpacity: 0.56, clusterSize: 54 },
  };

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "showEntities": true,
    "showStipple": true,
    "showFrame": true,
    "covenantLabels": false,
    "clusterSize": 62,
    "panelOpacity": 0.82,
    "joystickVariant": "fixed"
  }/*EDITMODE-END*/;

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const [scale, setScale] = useState(1);
    useEffect(() => {
      const fit = () => setScale(Math.min(window.innerWidth / 410, window.innerHeight / 864, 1));
      fit();
      window.addEventListener('resize', fit);
      return () => window.removeEventListener('resize', fit);
    }, []);

    return (
      <React.Fragment>
        <div style={{ position: 'fixed', inset: 0, display: 'grid', placeItems: 'center', overflow: 'hidden' }}>
          <div className="phone" style={{ transform: `scale(${scale})`, transformOrigin: 'center center' }}>
            <div className="notch"></div>
            <div style={{ position: 'absolute', inset: 0 }}>
              <HudPortrait small={true} t={t} />
            </div>
          </div>
        </div>

        <TweaksPanel title="Tweaks">
          <TweakSection label="Quick layout" />
          <div style={{ display: 'flex', gap: 8, width: '100%' }}>
            <TweakButton label="Full" secondary onClick={() => setTweak(PRESETS_M.full)} />
            <TweakButton label="Calm" onClick={() => setTweak(PRESETS_M.calm)} />
            <TweakButton label="Minimal" secondary onClick={() => setTweak(PRESETS_M.minimal)} />
          </div>

          <TweakSection label="Field" />
          <TweakToggle label="Field entities" value={t.showEntities} onChange={(v) => setTweak('showEntities', v)} />
          <TweakToggle label="Stipple radiance" value={t.showStipple} onChange={(v) => setTweak('showStipple', v)} />
          <TweakToggle label="Page frame" value={t.showFrame} onChange={(v) => setTweak('showFrame', v)} />
          <TweakSlider label="Panel opacity" value={t.panelOpacity} min={0.4} max={0.95} step={0.01} onChange={(v) => setTweak('panelOpacity', v)} />

          <TweakSection label="Covenant cluster" />
          <TweakSlider label="Roundel size" value={t.clusterSize} min={48} max={84} step={2} unit="px" onChange={(v) => setTweak('clusterSize', v)} />
          <TweakToggle label="Cluster labels" value={t.covenantLabels} onChange={(v) => setTweak('covenantLabels', v)} />

          <TweakSection label="Controls" />
          <TweakRadio label="Joystick" value={t.joystickVariant} options={['fixed', 'floating']} onChange={(v) => setTweak('joystickVariant', v)} />
        </TweaksPanel>
      </React.Fragment>
    );
  }

  const __mEl = document.getElementById('root');
  window.__mRoot = window.__mRoot || ReactDOM.createRoot(__mEl);
  window.__mRoot.render(<App />);
</script>
</body>
</html>
