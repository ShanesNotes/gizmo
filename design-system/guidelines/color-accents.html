<!-- @dsCard group="Colors" viewport="700x150" name="Accents & the rarity ladder" subtitle="Coral / pink / orange + Common→Evolve rank colors" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--void); font-family: var(--font-body); color: var(--lumen); }
  .pad { padding: 18px; display: flex; flex-direction: column; gap: 14px; }
  .group { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--r-sm); height: 46px; display: flex; align-items: center; padding: 0 12px; gap: 8px; font-weight: 900; font-size: 12px; }
  .dot { width: 16px; height: 16px; border-radius: 50%; }
  .lab { font-family: var(--font-manuscript); font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold-leaf); }
</style>
</head>
<body>
  <div class="pad">
    <div>
      <div class="lab">Accents</div>
      <div class="group" style="margin-top:8px">
        <div class="sw" style="background:rgba(255,107,126,.16);color:var(--coral)"><span class="dot" style="background:var(--coral)"></span>Coral · health</div>
        <div class="sw" style="background:rgba(255,121,198,.16);color:var(--pink)"><span class="dot" style="background:var(--pink)"></span>Pink · epic</div>
        <div class="sw" style="background:rgba(255,157,92,.16);color:var(--orange)"><span class="dot" style="background:var(--orange)"></span>Orange · heat</div>
      </div>
    </div>
    <div>
      <div class="lab">Rarity ladder — gold-leaf &amp; seal density first, glow second</div>
      <div class="group" style="margin-top:8px">
        <div class="sw" style="background:var(--field);color:#9892B4"><span class="dot" style="background:#9892B4"></span>Common</div>
        <div class="sw" style="background:var(--field);color:var(--flow)"><span class="dot" style="background:var(--flow)"></span>Uncommon</div>
        <div class="sw" style="background:var(--field);color:var(--clutch)"><span class="dot" style="background:var(--clutch)"></span>Rare</div>
        <div class="sw" style="background:var(--field);color:var(--pink)"><span class="dot" style="background:var(--pink)"></span>Epic</div>
        <div class="sw" style="background:var(--field);color:var(--surge);box-shadow:inset 0 0 0 1.5px var(--gold-tarnished)"><span class="dot" style="background:var(--surge)"></span>Evolve</div>
      </div>
    </div>
  </div>
</body>
</html>
