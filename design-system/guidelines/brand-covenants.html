<!-- @dsCard group="Brand" viewport="700x190" name="The four covenant roundels" subtitle="Flow·Thread · Clutch·Breath · Echo·Vigil · Surge·Seal" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: radial-gradient(120% 90% at 50% 30%, #1C1540, #130E2A, #0A0814); font-family: var(--font-body); }
  .stip { position: absolute; inset: 0; opacity: .4; background-image: radial-gradient(var(--stipple) 1px, transparent 1px); background-size: 14px 14px; }
  .wrap { position: relative; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 6px; }
  /* sheet is 600px wide, four ~150px cells */
  .sheet { width: 600px; display: block; }
  .labels { display: grid; grid-template-columns: repeat(4, 150px); }
  .labels div { font-family: var(--font-manuscript); font-weight: 700; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; text-align: center; }
</style>
</head>
<body>
  <div class="stip"></div>
  <div class="wrap">
    <img class="sheet" src="../assets/sprites/covenant-emblems.svg" alt="covenant emblems" />
  </div>
</body>
</html>
