<!-- @dsCard group="Spacing" viewport="700x180" name="Shadow & glow systems" subtitle="Outer drop · inner luminous edge · reward glow ring" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--void); font-family: var(--font-body); color: var(--lumen); }
  .row { display: flex; gap: 20px; padding: 28px; flex-wrap: wrap; }
  .card { width: 150px; height: 96px; border-radius: var(--r-md); background: var(--panel); display: flex; align-items: flex-end; padding: 10px; font-size: 11px; font-weight: 900; color: var(--lumen-dim); }
  .a { box-shadow: var(--shadow-panel); border: 2px solid var(--gold-tarnished); }
  .b { box-shadow: var(--shadow-card); }
  .c { background: var(--surge); color: var(--ink); box-shadow: var(--ring-surge), var(--shadow-float); border: 2px solid var(--gold-leaf); }
</style>
</head>
<body>
  <div class="row">
    <div class="card a">Panel · edge + drop</div>
    <div class="card b">Card · soft drop</div>
    <div class="card c">Reward · glow ring</div>
  </div>
</body>
</html>
