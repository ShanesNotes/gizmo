<!-- @dsCard group="Brand" viewport="700x220" name="Entities — hero, enemies, pickups" subtitle="Flat-vector, faces with attitude, bright pickups / matte enemies" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: radial-gradient(120% 90% at 50% 30%, #1C1540, #130E2A, #0A0814); font-family: var(--font-body); color: var(--lumen); }
  .grid { display: flex; align-items: flex-end; gap: 22px; padding: 20px 26px; flex-wrap: wrap; }
  .it { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .it img { height: 78px; }
  .it.hero img { filter: drop-shadow(0 0 18px var(--glow-clutch)); }
  .cap { font-size: 10px; font-weight: 900; letter-spacing: .4px; color: var(--lumen-dim); }
</style>
</head>
<body>
  <div class="grid">
    <div class="it hero"><img src="../assets/sprites/gizmo.svg" alt="gizmo" /><div class="cap">GIZMO</div></div>
    <div class="it"><img src="../assets/sprites/enemy-drifter.svg" alt="drifter" /><div class="cap">Drifter</div></div>
    <div class="it"><img src="../assets/sprites/enemy-bumper.svg" alt="bumper" /><div class="cap">Bumper</div></div>
    <div class="it"><img src="../assets/sprites/enemy-counterfeit.svg" alt="counterfeit" /><div class="cap">Counterfeit</div></div>
    <div class="it"><img src="../assets/sprites/pickup-spark.svg" alt="spark" /><div class="cap">Spark</div></div>
    <div class="it"><img src="../assets/sprites/pickup-heart.svg" alt="heart" /><div class="cap">Breath</div></div>
    <div class="it"><img src="../assets/sprites/cache-reliquary.svg" alt="reliquary" /><div class="cap">Reliquary</div></div>
  </div>
</body>
</html>
