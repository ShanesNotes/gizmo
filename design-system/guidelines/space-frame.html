<!-- @dsCard group="Spacing" viewport="700x200" name="Stipple radiance & the page frame" subtitle="Glow built from gold-dust dots + corner wax-seals + dashed rule" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: radial-gradient(120% 90% at 50% 20%, #1C1540, #130E2A, #0A0814); }
  .stage { position: relative; height: 200px; overflow: hidden; }
  .stip { position: absolute; inset: 0; opacity: .55; background-image: radial-gradient(var(--stipple) 1.1px, transparent 1.1px); background-size: 14px 14px; }
  .frame { position: absolute; inset: 18px; border: 2px solid var(--gold-tarnished); border-radius: 8px; box-shadow: inset 0 0 0 1px rgba(232,188,136,.4); }
  .frame::before { content:""; position:absolute; inset:5px; border:1px dashed rgba(232,188,136,.35); border-radius:5px; }
  .seal { position: absolute; width: 22px; height: 22px; transform: rotate(45deg); background: var(--oxblood); border: 2px solid var(--gold-leaf); }
  .tl{left:11px;top:11px}.tr{right:11px;top:11px}.bl{left:11px;bottom:11px}.br{right:11px;bottom:11px}
  .cap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--font-manuscript); font-weight: 700; letter-spacing: 3px; text-transform: uppercase; font-size: 14px; color: var(--gold-leaf); }
</style>
</head>
<body>
  <div class="stage">
    <div class="stip"></div>
    <div class="frame"></div>
    <div class="seal tl"></div><div class="seal tr"></div><div class="seal bl"></div><div class="seal br"></div>
    <div class="cap">The Page Apparatus</div>
  </div>
</body>
</html>
