<!-- @dsCard group="Type" viewport="700x200" name="Body — Nunito" subtitle="Clean UI voice — heavy weights for presence on dark" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--void); font-family: var(--font-body); color: var(--lumen); }
  .pad { padding: 22px 26px; display: flex; flex-direction: column; gap: 10px; }
  .lead { font-weight: 900; font-size: 22px; }
  .body { font-weight: 800; font-size: 14px; color: var(--lumen-dim); line-height: 1.4; max-width: 560px; }
  .pill { display: inline-flex; gap: 8px; font-weight: 900; font-size: 12px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--lumen-dim); }
  .meta { color: var(--lumen-dim); font-weight: 800; font-size: 12px; margin-top: 4px; }
  .meta b { color: var(--gold-leaf); }
</style>
</head>
<body>
  <div class="pad">
    <div class="lead">Your pulse fires a second beat</div>
    <div class="body">Echo windows now chain into a Surge burst. Distilled feedback, calm core, loud payoff — the body voice stays clear and kid-readable.</div>
    <div class="pill">Fire Rate · Blast Area · Evolved</div>
    <div class="meta"><b>Nunito 800 / 900</b> · descriptions 14px · eyebrows 12px UPPERCASE · min 11px</div>
  </div>
</body>
</html>
