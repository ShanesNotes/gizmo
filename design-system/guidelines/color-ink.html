<!-- @dsCard group="Colors" viewport="700x150" name="The Matter — ink, lapis, parchment" subtitle="Witness, cold judgment, mercy — the rarer pigments" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--void); font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 18px; }
  .sw { border-radius: var(--r-md); height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; border: 1px solid var(--hairline); }
  .name { font-weight: 900; font-size: 12px; letter-spacing: .3px; color: var(--lumen); }
  .hex { font-size: 11px; font-variant-numeric: tabular-nums; color: var(--lumen-dim); }
  .ondark .name { color: var(--lumen); } .light .name, .light .hex { color: var(--ink); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--ink)"><div class="name">Ink</div><div class="hex">#211B17</div></div>
    <div class="sw" style="background:var(--lapis)"><div class="name">Lapis Night</div><div class="hex">#263D5E</div></div>
    <div class="sw" style="background:var(--ward-green)"><div class="name">Ward Green</div><div class="hex">#365A49</div></div>
    <div class="sw" style="background:var(--dusty-rose)"><div class="name">Dusty Rose</div><div class="hex">#B07A83</div></div>
    <div class="sw light" style="background:var(--parchment)"><div class="name">Parchment</div><div class="hex">#F8F1E5</div></div>
  </div>
</body>
</html>
