<!-- @dsCard group="Colors" viewport="700x150" name="The Matter — ancient pigments" subtitle="Gold carries light · red carries cost · ink makes it official" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--void); font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 18px; }
  .sw { border-radius: var(--r-md); height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
  .name { font-weight: 900; font-size: 12px; letter-spacing: .3px; }
  .hex { font-size: 11px; font-variant-numeric: tabular-nums; opacity: .8; }
  .dark .name, .dark .hex { color: var(--lumen); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--gold-leaf);color:var(--ink)"><div class="name">Gold-leaf</div><div class="hex">#E8BC88</div></div>
    <div class="sw" style="background:var(--gold-tarnished);color:var(--ink)"><div class="name">Tarnished</div><div class="hex">#A87A2E</div></div>
    <div class="sw dark" style="background:var(--bole)"><div class="name">Burnt Bole</div><div class="hex">#7A5020</div></div>
    <div class="sw dark" style="background:var(--oxblood)"><div class="name">Oxblood</div><div class="hex">#7E2531</div></div>
    <div class="sw dark" style="background:var(--vermilion)"><div class="name">Vermilion</div><div class="hex">#C45A40</div></div>
  </div>
</body>
</html>
