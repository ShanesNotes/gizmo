<!-- @dsCard group="Brand" viewport="700x260" name="The Emblem — Illuminated G" subtitle="Gold-ground medallion, oxblood gem-seals, neon power-core" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: radial-gradient(120% 90% at 50% 30%, #1C1540, #130E2A, #0A0814); font-family: var(--font-body); color: var(--lumen); }
  .row { display: flex; align-items: center; gap: 30px; padding: 26px 34px; }
  .row img { filter: drop-shadow(0 6px 26px var(--glow-gold)); }
  .e1 { width: 150px; }
  .e2 { width: 84px; }
  .e3 { width: 52px; }
  .meta { font-size: 13px; font-weight: 800; color: var(--lumen-dim); line-height: 1.5; }
  .meta b { color: var(--gold-leaf); }
  .cap { font-family: var(--font-manuscript); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--lumen-dim); text-align: center; margin-top: 6px; }
  .stack { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="stack"><img class="e1" src="../assets/brand/emblem-illuminated.svg" alt="emblem" /><div class="cap">Full · 104px+</div></div>
    <div class="stack"><img class="e2" src="../assets/brand/emblem.svg" alt="emblem" /><div class="cap">Medium</div></div>
    <div class="stack"><img class="e3" src="../assets/brand/emblem-mark-mini.svg" alt="emblem mini" /><div class="cap">Mini · tiny sizes</div></div>
    <div class="meta">The chosen <b>Illuminated-G</b>. A power-button glyph (cyan core + lapis ring) set in a gold-ground medallion with oxblood gem-seals and a stipple-dash aureole. Use <b>emblem-mark-mini</b> below ~48px.</div>
  </div>
</body>
</html>
