<!-- @dsCard group="Type" viewport="700x210" name="Manuscript — Cormorant Garamond" subtitle="The ceremonial voice — labels, verdicts, taglines" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--void); font-family: var(--font-body); color: var(--lumen); }
  .pad { padding: 22px 26px; display: flex; flex-direction: column; gap: 12px; }
  .verdict { font-family: var(--font-manuscript); font-style: italic; font-weight: 600; font-size: 28px; color: rgba(255,247,232,.85); }
  .label { font-family: var(--font-manuscript); font-weight: 700; font-size: 20px; color: var(--gold-leaf); }
  .eyebrow { font-family: var(--font-manuscript); font-weight: 700; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold-leaf); }
  .meta { color: var(--lumen-dim); font-weight: 800; font-size: 12px; }
</style>
</head>
<body>
  <div class="pad">
    <div class="verdict">A spark re-illuminates the dark</div>
    <div class="label">The Claiming — chase the gold, seal the bounty</div>
    <div class="eyebrow">Illumination · Covenant · Reliquary · Vigil</div>
    <div class="meta">Cormorant Garamond 600–700 · italic for taglines · UPPERCASE +2px for eyebrows</div>
  </div>
</body>
</html>
