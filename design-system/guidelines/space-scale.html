<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="8px base — charged empty space frames every payoff" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--void); font-family: var(--font-body); color: var(--lumen); }
  .pad { padding: 22px; display: flex; flex-direction: column; gap: 9px; }
  .r { display: flex; align-items: center; gap: 12px; }
  .bar { height: 14px; background: var(--gold-leaf); border-radius: 3px; }
  .lab { font-size: 11px; font-weight: 900; color: var(--lumen-dim); width: 70px; }
</style>
</head>
<body>
  <div class="pad">
    <div class="r"><span class="lab">1 · 4px</span><div class="bar" style="width:4px"></div></div>
    <div class="r"><span class="lab">2 · 8px</span><div class="bar" style="width:8px"></div></div>
    <div class="r"><span class="lab">3 · 12px</span><div class="bar" style="width:12px"></div></div>
    <div class="r"><span class="lab">4 · 16px</span><div class="bar" style="width:16px"></div></div>
    <div class="r"><span class="lab">6 · 26px</span><div class="bar" style="width:26px"></div></div>
    <div class="r"><span class="lab">8 · 48px</span><div class="bar" style="width:48px"></div></div>
    <div class="r"><span class="lab">10 · 88px</span><div class="bar" style="width:88px"></div></div>
  </div>
</body>
</html>
